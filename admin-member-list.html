<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会員一覧 | 管理者ポータル</title>
    <link rel="icon" type="image/png" href="./CIDMchara.png">
    <link href="./output.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0f172a; font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; display: flex; flex-direction: column; color: #cbd5e1; }

        /* Header */
        .admin-header { display:flex; align-items:center; justify-content:space-between; padding:0 2rem; height:64px; background:#0f172a; border-bottom:1px solid #1e293b; position:sticky; top:0; z-index:10; }
        .brand { display:flex; align-items:center; gap:0.75rem; text-decoration:none; }
        .brand-icon { width:36px; height:36px; background:linear-gradient(135deg,#3b82f6,#6366f1); border-radius:9px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:1rem; }
        .brand-text { font-size:0.78rem; font-weight:700; color:#94a3b8; letter-spacing:0.1em; text-transform:uppercase; }
        .brand-text span { display:block; color:#f1f5f9; font-size:0.9rem; letter-spacing:0.04em; }
        .header-back { display:inline-flex; align-items:center; gap:0.4rem; color:#64748b; text-decoration:none; font-size:0.78rem; font-weight:700; letter-spacing:0.06em; border:1px solid #334155; border-radius:9999px; padding:0.3rem 0.9rem; transition:color 0.15s, border-color 0.15s; }
        .header-back:hover { color:#93c5fd; border-color:#3b82f6; }

        /* Body */
        .admin-body { flex:1; padding:2.5rem 1.5rem 4rem; max-width:980px; margin:0 auto; width:100%; }

        /* Page heading */
        .page-heading { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:2rem; flex-wrap:wrap; gap:1rem; }
        .page-heading .left .eyebrow { font-size:0.7rem; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:#3b82f6; margin-bottom:0.35rem; }
        .page-heading .left h1 { font-size:1.7rem; font-weight:700; color:#f1f5f9; }

        /* New button */
        .btn-new { display:inline-flex; align-items:center; gap:0.5rem; background:linear-gradient(135deg,#3b82f6,#6366f1); color:#fff; border:none; padding:0.65rem 1.4rem; border-radius:9999px; font-size:0.84rem; font-weight:700; cursor:pointer; text-decoration:none; transition:opacity 0.15s, transform 0.12s; }
        .btn-new:hover { opacity:0.88; transform:translateY(-1px); }
        .filter-bar { margin-top:0.4rem; display:flex; gap:1rem; align-items:center; color:#94a3b8; font-size:0.84rem; }
        .filter-chip { display:inline-flex; align-items:center; gap:0.45rem; border:1px solid #334155; border-radius:9999px; padding:0.35rem 0.75rem; background:#1e293b; }
        .filter-chip input[type=checkbox] { accent-color:#3b82f6; }

        /* Table card */
        .table-card { background:#1e293b; border:1px solid #334155; border-radius:1rem; overflow:hidden; }
        .member-table { width:100%; border-collapse:collapse; }
        .member-table th { background:#0f172a; color:#64748b; font-size:0.72rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; padding:0.85rem 1rem; text-align:left; border-bottom:1px solid #334155; }
        .member-table td { padding:0.9rem 1rem; border-bottom:1px solid #243347; color:#cbd5e1; font-size:0.88rem; }
        .member-table tbody tr:last-child td { border-bottom:none; }
        .member-table tbody tr { cursor:pointer; transition:background 0.12s; }
        .member-table tbody tr:hover td { background:#263347; }
        .company-name { font-weight:700; color:#e2e8f0; }
        .sub-text { color:#64748b; font-size:0.8rem; }

        /* Footer */
        .admin-footer { text-align:center; padding:1.25rem; font-size:0.68rem; color:#334155; letter-spacing:0.08em; text-transform:uppercase; border-top:1px solid #1e293b; }
    </style>
</head>
<body>
    <header class="admin-header">
        <a href="admin-portal.html" class="brand">
            <div class="brand-icon"><i class="fa-solid fa-shield-halved"></i></div>
            <div class="brand-text">CIDM <span>管理者ポータル</span></div>
        </a>
        <a href="admin-portal.html" class="header-back"><i class="fa-solid fa-chevron-left"></i> ポータルへ戻る</a>
    </header>

    <div class="admin-body">
        <div class="page-heading">
            <div class="left">
                <p class="eyebrow">Member Management</p>
                <h1>会員一覧</h1>
                <div class="filter-bar">
                    <span>区分:</span>
                    <label class="filter-chip"><input type="checkbox" id="division-member" checked> 会員</label>
                    <label class="filter-chip"><input type="checkbox" id="division-related" checked> 関係者</label>
                </div>
            </div>
            <a href="admin-member-new.html" class="btn-new"><i class="fa-solid fa-user-plus"></i> 新規追加</a>
        </div>

        <div class="table-card">
            <table class="member-table">
                <thead>
                    <tr>
                        <th>区分</th>
                        <th>会員種別</th>
                        <th>会社名</th>
                        <th>CIDM役職</th>
                        <th>主担当者名</th>
                        <th>主担当携帯</th>
                        <th>主担当メール</th>
                        <th>備考</th>
                    </tr>
                </thead>
                <tbody id="members-tbody">
                    <tr><td colspan="8" style="text-align:center; color:#475569; padding:2rem;">読み込み中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <footer class="admin-footer">© 2013–2026 Center for Innovative Data and Mobility</footer>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./cidm-config.js"></script>
    <script src="./admin-auth.js"></script>
    <script src="./admin-ui.js"></script>
    <script>
    const supabaseClient = window.cidmAdminAuth.createSupabaseClient();
    let allMembers = [];

    function renderLoadingRows() {
        const cell = window.cidmAdminUi.getSkeletonLine('100%', '0.9rem');
        return Array.from({ length: 6 }).map(() => `
            <tr>
                <td>${cell}</td>
                <td>${cell}</td>
                <td>${cell}</td>
                <td>${cell}</td>
                <td>${cell}</td>
                <td>${cell}</td>
                <td>${cell}</td>
                <td>${cell}</td>
            </tr>
        `).join('');
    }

    function renderMembers(data) {
        const tbody = document.getElementById('members-tbody');
        if (!data || data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="8" style="text-align:center; color:#888;">該当する会員データはありません</td></tr>`;
            return;
        }

        const roleRank = {
            '理事長': 1,
            '理事長代理': 2,
            '副理事長': 3,
            '常務': 4,
            '理事': 5,
            '監事': 6,
            '顧問': 7,
            '事務局長': 8,
            'アドバイザリーボード': 9
        };
        const memberTypeRank = {
            '正会員': 1,
            '準会員': 2,
            '賛助会員': 3,
            '賛助': 3
        };

        const sorted = [...data].sort((a, b) => {
            const aRole = roleRank[a.cidm_role || ''] ?? 99;
            const bRole = roleRank[b.cidm_role || ''] ?? 99;
            if (aRole !== bRole) return aRole - bRole;

            const aType = memberTypeRank[a.member_type || ''] ?? 99;
            const bType = memberTypeRank[b.member_type || ''] ?? 99;
            if (aType !== bType) return aType - bType;

            return String(a.company_name || '').localeCompare(String(b.company_name || ''), 'ja');
        });

        tbody.innerHTML = sorted.map(item => `
            <tr style="cursor:pointer;" data-member-id="${item.id}">
                <td>${item.division_flag || '会員'}</td>
                <td>${item.member_type || ''}</td>
                <td><span class="company-name">${item.company_name || ''}</span></td>
                <td>${item.cidm_role || ''}</td>
                <td>${item.staff_name || ''}</td>
                <td><span class="sub-text">${item.staff_mobile || ''}</span></td>
                <td><span class="sub-text">${item.staff_email || ''}</span></td>
                <td><span class="sub-text">${item.biko || ''}</span></td>
            </tr>
        `).join('');
    }

    function applyDivisionFilterAndRender() {
        const includeMember = document.getElementById('division-member')?.checked;
        const includeRelated = document.getElementById('division-related')?.checked;
        const filtered = allMembers.filter((item) => {
            const division = item.division_flag || '会員';
            if (division === '会員') return includeMember;
            if (division === '関係者') return includeRelated;
            return includeMember;
        });
        renderMembers(filtered);
    }

    async function loadMembers() {
        const tbody = document.getElementById('members-tbody');
        tbody.innerHTML = renderLoadingRows();
        const { data, error } = await supabaseClient
            .from('member')
            .select('id, division_flag, member_type, company_name, cidm_role, staff_name, staff_mobile, staff_email, biko');
        if (error) {
            tbody.innerHTML = `<tr><td colspan="8" style="color:red; text-align:center;">データ取得エラー</td></tr>`;
            return;
        }
        if (!data || data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="8" style="text-align:center; color:#888;">会員データはありません</td></tr>`;
            return;
        }
        allMembers = data;
        applyDivisionFilterAndRender();
    }

    document.getElementById('members-tbody')?.addEventListener('click', (event) => {
        const row = event.target.closest('tr[data-member-id]');
        if (!row) return;
        const id = row.getAttribute('data-member-id');
        if (!id) return;
        window.location.href = 'admin-members.html?id=' + id;
    });

    document.addEventListener('DOMContentLoaded', async () => {
        const ok = await window.cidmAdminAuth.ensureAuthenticated(supabaseClient);
        if (!ok) return;
        document.getElementById('division-member')?.addEventListener('change', applyDivisionFilterAndRender);
        document.getElementById('division-related')?.addEventListener('change', applyDivisionFilterAndRender);
        loadMembers();
    });
    </script>
</body>
</html>
