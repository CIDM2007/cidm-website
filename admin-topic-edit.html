<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>トピック編集 | 管理者ポータル</title>
    <link href="./output.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0f172a; font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; display: flex; flex-direction: column; color: #cbd5e1; }
        .admin-header { display:flex; align-items:center; justify-content:space-between; padding:0 2rem; height:64px; background:#0f172a; border-bottom:1px solid #1e293b; position:sticky; top:0; z-index:10; }
        .brand { display:flex; align-items:center; gap:0.75rem; text-decoration:none; }
        .brand-icon { width:36px; height:36px; background:linear-gradient(135deg,#3b82f6,#6366f1); border-radius:9px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:1rem; }
        .brand-text { font-size:0.78rem; font-weight:700; color:#94a3b8; letter-spacing:0.1em; text-transform:uppercase; }
        .brand-text span { display:block; color:#f1f5f9; font-size:0.9rem; letter-spacing:0.04em; }
        .header-back { display:inline-flex; align-items:center; gap:0.4rem; color:#64748b; text-decoration:none; font-size:0.78rem; font-weight:700; letter-spacing:0.06em; border:1px solid #334155; border-radius:9999px; padding:0.3rem 0.9rem; transition:color 0.15s, border-color 0.15s; }
        .header-back:hover { color:#93c5fd; border-color:#3b82f6; }
        .admin-body { flex:1; padding:2.5rem 1.5rem 4rem; max-width:680px; margin:0 auto; width:100%; }
        .form-card { background:#1e293b; border:1px solid #334155; border-radius:1rem; padding:2rem 2.2rem; }
        .form-heading { margin-bottom:1.8rem; }
        .form-heading .eyebrow { font-size:0.7rem; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:#3b82f6; margin-bottom:0.35rem; }
        .form-heading h1 { font-size:1.5rem; font-weight:700; color:#f1f5f9; display:flex; align-items:center; gap:0.5rem; }
        .form-group { margin-bottom:1.4rem; }
        label { display:block; font-size:0.78rem; font-weight:700; color:#94a3b8; letter-spacing:0.07em; text-transform:uppercase; margin-bottom:0.45rem; }
        input, textarea, select { width:100%; padding:0.72rem 0.9rem; border-radius:0.6rem; border:1px solid #334155; background:#0f172a; color:#e2e8f0; font-size:0.92rem; font-family:inherit; transition:border-color 0.15s, box-shadow 0.15s; outline:none; }
        input:focus, textarea:focus, select:focus { border-color:#3b82f6; box-shadow:0 0 0 3px rgba(59,130,246,0.15); }
        textarea { min-height:140px; resize:vertical; }
        select option { background:#1e293b; }
        .form-actions { display:flex; justify-content:flex-end; gap:0.75rem; margin-top:1.8rem; padding-top:1.4rem; border-top:1px solid #334155; }
        .btn { padding:0.6rem 1.4rem; border-radius:0.6rem; font-size:0.84rem; font-weight:700; cursor:pointer; transition:opacity 0.15s, transform 0.12s; display:inline-flex; align-items:center; gap:0.35rem; border:none; }
        .btn:hover { transform:translateY(-1px); }
        .btn-submit { background:linear-gradient(135deg,#3b82f6,#6366f1); color:#fff; }
        .btn-submit:hover { opacity:0.88; }
        .btn-cancel { background:transparent; color:#64748b; border:1px solid #334155; }
        .btn-cancel:hover { background:#263347; color:#cbd5e1; border-color:#475569; }
        .file-picker { display:flex; align-items:center; gap:0.7rem; flex-wrap:wrap; }
        .file-help { font-size:0.74rem; color:#64748b; margin-top:0.4rem; }
        .attach-list { margin-top:0.65rem; display:flex; flex-direction:column; gap:0.45rem; }
        .attach-item { display:flex; align-items:center; justify-content:space-between; gap:0.6rem; border:1px solid #334155; background:#0f172a; border-radius:0.55rem; padding:0.45rem 0.6rem; }
        .attach-item a { color:#93c5fd; text-decoration:none; font-size:0.82rem; overflow-wrap:anywhere; }
        .attach-item a:hover { text-decoration:underline; }
        .attach-remove { border:1px solid #7f1d1d; background:#2d1b1b; color:#fecaca; border-radius:0.45rem; padding:0.25rem 0.5rem; font-size:0.72rem; font-weight:700; cursor:pointer; }
        .attach-remove:hover { background:#7f1d1d; color:#fff; }
        .admin-footer { text-align:center; padding:1.25rem; font-size:0.68rem; color:#334155; letter-spacing:0.08em; text-transform:uppercase; border-top:1px solid #1e293b; }
    </style>
</head>
<body>
    <header class="admin-header">
        <a href="admin-portal.html" class="brand">
            <div class="brand-icon"><i class="fa-solid fa-shield-halved"></i></div>
            <div class="brand-text">CIDM <span>管理者ポータル</span></div>
        </a>
        <a href="admin-topics.html" class="header-back"><i class="fa-solid fa-chevron-left"></i> トピック管理へ戻る</a>
    </header>

    <div class="admin-body">
        <div class="form-card">
            <div class="form-heading">
                <p class="eyebrow">Content Management</p>
                <h1 id="edit-title"><i class="fa-solid fa-pen"></i> トピック編集</h1>
            </div>
            <form id="topic-form">
                <div class="form-group">
                    <label for="title">タイトル</label>
                    <input type="text" id="title" name="title" required>
                </div>
                <div class="form-group">
                    <label for="event_date">日付</label>
                    <input type="date" id="event_date" name="event_date" required>
                </div>
                <div class="form-group">
                    <label for="is_visible">公開設定</label>
                    <select id="is_visible" name="is_visible">
                        <option value="true">公開</option>
                        <option value="false">非公開</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="details">概要</label>
                    <textarea id="details" name="details" required></textarea>
                </div>
                <div class="form-group">
                    <label for="detail_text">詳細</label>
                    <textarea id="detail_text" name="detail_text"></textarea>
                </div>
                <div class="form-group">
                    <label for="attachments">添付ファイル（PDF・画像・動画）</label>
                    <div class="file-picker">
                        <input type="file" id="attachments" name="attachments" multiple accept=".pdf,image/*,video/*">
                    </div>
                    <div class="file-help">添付可能: PDF / 画像 / 動画。50MBを超える場合はアップロードに失敗することがあります。</div>
                    <div id="existing-attachments" class="attach-list"></div>
                    <div id="new-attachments" class="attach-list"></div>
                </div>
                <div class="form-actions">
                    <button type="button" id="cancel-btn" class="btn btn-cancel">キャンセル</button>
                    <button type="submit" class="btn btn-submit">更新</button>
                </div>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./cidm-config.js"></script>
    <script src="./admin-auth.js"></script>
    <script src="./admin-ui.js"></script>
    <script>
    const supabaseClient = window.cidmAdminAuth.createSupabaseClient();

    const form = document.getElementById('topic-form');
    const cancelBtn = document.getElementById('cancel-btn');
    const submitBtn = form.querySelector('.btn-submit');
    const attachmentInput = document.getElementById('attachments');
    const existingAttachmentsEl = document.getElementById('existing-attachments');
    const newAttachmentsEl = document.getElementById('new-attachments');
    const ALLOWED_MIME_PREFIX = ['image/', 'video/'];
    const ALLOWED_MIME_EXACT = ['application/pdf'];
    const ALLOWED_EXT = ['.pdf', '.png', '.jpg', '.jpeg', '.gif', '.webp', '.mp4', '.mov', '.avi', '.wmv', '.mkv'];
    const STORAGE_BUCKET = 'meeting-report-assets';

    let existingAttachmentUrls = [];
    let selectedFiles = [];

    function escapeHtml(v) {
        return String(v || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function getFileNameFromUrl(url) {
        try {
            const path = new URL(url).pathname;
            return decodeURIComponent(path.split('/').pop() || url);
        } catch {
            return url;
        }
    }

    function isAllowedFile(file) {
        const type = String(file.type || '').toLowerCase();
        if (ALLOWED_MIME_EXACT.includes(type)) return true;
        if (ALLOWED_MIME_PREFIX.some((p) => type.startsWith(p))) return true;
        const lowerName = String(file.name || '').toLowerCase();
        return ALLOWED_EXT.some((ext) => lowerName.endsWith(ext));
    }

    function renderExistingAttachments() {
        if (!existingAttachmentsEl) return;
        if (!existingAttachmentUrls.length) {
            existingAttachmentsEl.innerHTML = '';
            return;
        }
        existingAttachmentsEl.innerHTML = existingAttachmentUrls.map((url, idx) => {
            const safeUrl = window.cidmAdminUi.sanitizeUrl(url);
            const fileName = window.cidmAdminUi.sanitizeText(getFileNameFromUrl(url));
            return `
            <div class="attach-item">
                <a href="${safeUrl}" target="_blank" rel="noopener">${fileName}</a>
                <button type="button" class="attach-remove" data-remove-existing="${idx}">削除</button>
            </div>
        `;
        }).join('');
    }

    function renderNewAttachments() {
        if (!newAttachmentsEl) return;
        if (!selectedFiles.length) {
            newAttachmentsEl.innerHTML = '';
            return;
        }
        newAttachmentsEl.innerHTML = selectedFiles.map((file, idx) => `
            <div class="attach-item">
                <span style="font-size:0.82rem; color:#cbd5e1;">${window.cidmAdminUi.sanitizeText(file.name)}</span>
                <button type="button" class="attach-remove" data-remove-new="${idx}">削除</button>
            </div>
        `).join('');
    }

    async function uploadSelectedFiles() {
        const uploadedUrls = [];
        for (const file of selectedFiles) {
            const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
            const path = `topics/${Date.now()}-${Math.random().toString(36).slice(2, 8)}-${safeName}`;
            const { error } = await supabaseClient.storage.from(STORAGE_BUCKET).upload(path, file, { upsert: false });
            if (error) {
                throw new Error(`添付ファイルのアップロードに失敗しました: ${error.message}`);
            }
            const { data } = supabaseClient.storage.from(STORAGE_BUCKET).getPublicUrl(path);
            uploadedUrls.push(data.publicUrl);
        }
        return uploadedUrls;
    }

    cancelBtn?.addEventListener('click', async () => {
        const accepted = await window.cidmAdminUi.showConfirm('入力内容を破棄して戻りますか？', { confirmText: '戻る' });
        if (!accepted) return;
        window.location.href = 'admin-topics.html';
    });

    document.addEventListener('DOMContentLoaded', async () => {
        await window.cidmAdminAuth.ensureAuthenticated(supabaseClient);
    });

    attachmentInput?.addEventListener('change', (event) => {
        const files = Array.from(event.target.files || []);
        if (!files.length) {
            selectedFiles = [];
            renderNewAttachments();
            return;
        }
        const invalid = files.find((file) => !isAllowedFile(file));
        if (invalid) {
            window.cidmAdminUi.showToast(`対応していないファイル形式です: ${invalid.name}`, 'error', 2600);
            attachmentInput.value = '';
            return;
        }
        selectedFiles = files;
        renderNewAttachments();
    });

    existingAttachmentsEl?.addEventListener('click', (event) => {
        const btn = event.target.closest('button[data-remove-existing]');
        if (!btn) return;
        const idx = Number(btn.getAttribute('data-remove-existing'));
        if (!Number.isInteger(idx)) return;
        existingAttachmentUrls.splice(idx, 1);
        renderExistingAttachments();
    });

    newAttachmentsEl?.addEventListener('click', (event) => {
        const btn = event.target.closest('button[data-remove-new]');
        if (!btn) return;
        const idx = Number(btn.getAttribute('data-remove-new'));
        if (!Number.isInteger(idx)) return;
        selectedFiles.splice(idx, 1);
        renderNewAttachments();
    });

    // URLからid取得
    const urlParams = new URLSearchParams(window.location.search);
    const topicId = urlParams.get('id');
    const editTitle = document.getElementById('edit-title');
    if (!topicId) {
        // 新規登録モード
        editTitle.innerHTML = '<i class="fa-solid fa-plus"></i> トピック新規登録';
        submitBtn.textContent = '登録';
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            await window.cidmAdminUi.runWithButtonBusy(submitBtn, async () => {
                const ok = await window.cidmAdminAuth.ensureAuthenticated(supabaseClient);
                if (!ok) return;

                const title = form.title.value.trim();
                const event_date = form.event_date.value;
                const is_visible = form.is_visible.value === 'true';
                const details = form.details.value.trim();
                const detail_text = form.detail_text.value.trim() || null;
                if (!title || !event_date || !details) {
                    window.cidmAdminUi.showToast('全ての項目を入力してください。', 'error', 2200);
                    return;
                }

                const uploadedUrls = await uploadSelectedFiles();
                const attachment_urls = [...existingAttachmentUrls, ...uploadedUrls];

                const { error } = await supabaseClient.from('meeting_reports').insert([{ title, event_date, is_visible, details, detail_text, attachment_urls }]);
                if (error) {
                    window.cidmAdminUi.showToast('登録に失敗しました: ' + error.message, 'error', 3000);
                } else {
                    window.cidmAdminUi.showToast('登録が完了しました。', 'success', 900);
                    setTimeout(() => { window.location.href = 'admin-topics.html'; }, 500);
                }
            }, '登録中...');
        });
    } else {
        // 編集モード
        (async () => {
            const ok = await window.cidmAdminAuth.ensureAuthenticated(supabaseClient);
            if (!ok) return;
            const { data, error } = await supabaseClient.from('meeting_reports').select('*').eq('id', topicId).single();
            if (error || !data) {
                window.cidmAdminUi.showToast('データ取得に失敗しました。', 'error', 3000);
                form.style.display = 'none';
                return;
            }
            form.title.value = data.title || '';
            form.event_date.value = data.event_date || '';
            form.is_visible.value = data.is_visible ? 'true' : 'false';
            form.details.value = data.details || '';
            form.detail_text.value = data.detail_text || '';
            existingAttachmentUrls = Array.isArray(data.attachment_urls) ? data.attachment_urls : [];
            renderExistingAttachments();
        })();
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            await window.cidmAdminUi.runWithButtonBusy(submitBtn, async () => {
                const ok = await window.cidmAdminAuth.ensureAuthenticated(supabaseClient);
                if (!ok) return;

                const title = form.title.value.trim();
                const event_date = form.event_date.value;
                const is_visible = form.is_visible.value === 'true';
                const details = form.details.value.trim();
                const detail_text = form.detail_text.value.trim() || null;
                if (!title || !event_date || !details) {
                    window.cidmAdminUi.showToast('全ての項目を入力してください。', 'error', 2200);
                    return;
                }

                const uploadedUrls = await uploadSelectedFiles();
                const attachment_urls = [...existingAttachmentUrls, ...uploadedUrls];

                const { error } = await supabaseClient.from('meeting_reports').update({ title, event_date, is_visible, details, detail_text, attachment_urls }).eq('id', topicId);
                if (error) {
                    window.cidmAdminUi.showToast('更新に失敗しました: ' + error.message, 'error', 3000);
                } else {
                    window.cidmAdminUi.showToast('更新が完了しました。', 'success', 900);
                    setTimeout(() => { window.location.href = 'admin-topics.html'; }, 500);
                }
            }, '更新中...');
        });
    }
    </script>

    <footer class="admin-footer">© 2013–2026 Center for Innovative Data and Mobility</footer>
</body>
</html>
