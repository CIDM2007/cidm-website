<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理者ポータル | CIDM</title>
    <link rel="icon" type="image/png" href="./CIDMchara.png">
    <link href="./output.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background:
                radial-gradient(1200px 500px at 20% -10%, #dbeafe 0%, transparent 60%),
                radial-gradient(900px 400px at 85% -5%, #e0e7ff 0%, transparent 55%),
                #eef2f7;
            font-family: 'Noto Sans JP', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #1e293b;
        }

        /* ─── Header ─── */
        .admin-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            height: 72px;
            background: rgba(255, 255, 255, 0.78);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid #dbe4ef;
            position: sticky;
            top: 0;
            z-index: 10;
            box-shadow: 0 1px 8px rgba(15, 23, 42, 0.06);
        }
        .admin-header .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }
        .admin-header .brand-icon {
            width: 38px; height: 38px;
            background: linear-gradient(135deg, #2563eb, #0ea5e9);
            border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            color: #fff;
            font-size: 1rem;
        }
        .admin-header .brand-text {
            font-size: 0.78rem;
            font-weight: 700;
            color: #64748b;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .admin-header .brand-text span {
            display: block;
            color: #1e293b;
            font-size: 0.9rem;
            letter-spacing: 0.04em;
        }
        .header-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: #eff6ff;
            color: #475569;
            border: 1px solid #bfdbfe;
            border-radius: 9999px;
            padding: 0.3rem 0.9rem;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .header-badge i { color: #3b82f6; }

        /* ─── Main layout ─── */
        .admin-body {
            flex: 1;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 2.25rem 1.2rem 4rem;
        }
        .portal-card {
            width: 100%;
            max-width: 980px;
        }

        /* ─── Page heading ─── */
        .portal-heading {
            margin-bottom: 1.4rem;
        }
        .portal-heading .eyebrow {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #3b82f6;
            margin-bottom: 0.5rem;
        }
        .portal-heading h1 {
            font-size: clamp(1.7rem, 2.8vw, 2.2rem);
            font-weight: 700;
            color: #1e293b;
            line-height: 1.25;
        }
        .portal-heading p {
            margin-top: 0.5rem;
            font-size: 0.95rem;
            color: #64748b;
        }

        /* ─── Menu grid ─── */
        .admin-menu {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 1rem;
            margin-bottom: 1.2rem;
        }
        .admin-link {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: start;
            gap: 0.95rem;
            padding: 1.1rem 1.15rem;
            min-height: 142px;
            background: #ffffff;
            border: 1px solid #dbe4ef;
            border-radius: 16px;
            color: #475569;
            text-decoration: none;
            transition: background 0.18s, border-color 0.18s, transform 0.16s, box-shadow 0.2s;
            position: relative;
            overflow: clip;
            box-shadow: 0 1px 4px rgba(15, 23, 42, 0.08);
        }
        .admin-link::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(140deg, rgba(37,99,235,0.09), transparent 65%);
            opacity: 0;
            transition: opacity 0.18s;
            border-radius: inherit;
            pointer-events: none;
        }
        .admin-link:hover {
            background: #f8fbff;
            border-color: #93c5fd;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.16);
        }
        .admin-link:hover::after { opacity: 1; }
        .admin-link.disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        .admin-link .link-icon {
            width: 42px; height: 42px;
            background: linear-gradient(180deg, #eff6ff, #e2e8f0);
            border: 1px solid #d1dbe8;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.05rem;
            color: #2563eb;
            transition: background 0.18s, border-color 0.18s;
        }
        .admin-link:hover .link-icon {
            background: linear-gradient(180deg, #dbeafe, #e0f2fe);
            border-color: #60a5fa;
        }
        .admin-link .link-content {
            min-width: 0;
            padding-top: 0.1rem;
        }
        .admin-link .link-label {
            font-size: 1.18rem;
            font-weight: 700;
            color: #1e293b;
            line-height: 1.4;
            word-break: break-word;
            overflow-wrap: anywhere;
            margin-bottom: 0.35rem;
        }
        .admin-link .link-desc {
            font-size: 0.86rem;
            color: #64748b;
            line-height: 1.5;
            word-break: break-word;
            overflow-wrap: anywhere;
        }
        .admin-link .link-arrow {
            align-self: start;
            margin-top: 0.2rem;
            font-size: 0.78rem;
            color: #9fb3c9;
            transition: color 0.18s, transform 0.18s;
        }
        .admin-link:hover .link-arrow {
            color: #3b82f6;
            transform: translateX(2px);
        }

        /* ─── Logout ─── */
        .logout-wrap {
            margin-top: 1.25rem;
            display: flex;
            justify-content: flex-end;
        }
        #logout-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.72);
            color: #475569;
            border: 1px solid #cbd5e1;
            padding: 0.7rem 1.5rem;
            border-radius: 9999px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.18s, color 0.18s, border-color 0.18s;
        }
        #logout-btn:hover {
            background: #fef2f2;
            color: #dc2626;
            border-color: #dc2626;
        }

        /* ─── Footer ─── */
        .admin-footer {
            text-align: center;
            padding: 1.25rem;
            font-size: 0.68rem;
            color: #64748b;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            border-top: 1px solid #e2e8f0;
        }

        @media (max-width: 860px) {
            .admin-menu {
                grid-template-columns: 1fr;
            }
            .admin-link {
                min-height: 128px;
            }
            .logout-wrap {
                justify-content: center;
            }
        }

        @media (max-width: 520px) {
            .admin-header {
                padding: 0 1rem;
                height: 64px;
            }
            .header-badge {
                display: none;
            }
            .portal-heading p {
                font-size: 0.86rem;
            }
            .admin-link {
                padding: 1rem;
                gap: 0.8rem;
            }
            .admin-link .link-label {
                font-size: 1.05rem;
            }
            .admin-link .link-desc {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="admin-header">
        <a href="admin-portal.html" class="brand">
            <div class="brand-icon"><i class="fa-solid fa-shield-halved"></i></div>
            <div class="brand-text">
                CIDM
                <span>管理者ポータル</span>
            </div>
        </a>
        <div class="header-badge"><i class="fa-solid fa-circle-dot"></i> Admin Console</div>
    </header>

    <!-- Body -->
    <div class="admin-body">
        <div class="portal-card">
            <div class="portal-heading">
                <p class="eyebrow">Dashboard</p>
                <h1>管理者ポータル</h1>
                <p>コンテンツ・会員・サイト設定を一元管理します。</p>
            </div>

            <div class="admin-menu">
                <a href="admin-topics.html" class="admin-link">
                    <i class="fa-solid fa-chevron-right link-arrow"></i>
                    <div class="link-icon"><i class="fa-solid fa-newspaper"></i></div>
                    <div class="link-content">
                        <div class="link-label">トピック管理</div>
                        <div class="link-desc">お知らせ・記事の投稿・編集</div>
                    </div>
                </a>
                <a href="admin-member-list.html" class="admin-link">
                    <i class="fa-solid fa-chevron-right link-arrow"></i>
                    <div class="link-icon"><i class="fa-solid fa-users"></i></div>
                    <div class="link-content">
                        <div class="link-label">会員管理</div>
                        <div class="link-desc">会員情報の確認・編集</div>
                    </div>
                </a>
                <a href="admin-events.html" class="admin-link">
                    <i class="fa-solid fa-chevron-right link-arrow"></i>
                    <div class="link-icon"><i class="fa-solid fa-calendar-days"></i></div>
                    <div class="link-content">
                        <div class="link-label">会議イベント管理</div>
                        <div class="link-desc">開催情報作成・出欠確認</div>
                    </div>
                </a>
                <a href="admin-contact-settings.html" class="admin-link">
                    <i class="fa-solid fa-chevron-right link-arrow"></i>
                    <div class="link-icon"><i class="fa-solid fa-gear"></i></div>
                    <div class="link-content">
                        <div class="link-label">サイト設定</div>
                        <div class="link-desc">問い合わせ送信先の設定</div>
                    </div>
                </a>
            </div>

            <div class="logout-wrap">
                <button id="logout-btn"><i class="fa-solid fa-right-from-bracket"></i> ログアウト</button>
            </div>
        </div>
    </div>

    <footer class="admin-footer">© 2013–2026 Center for Innovative Data and Mobility</footer>
</body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./cidm-config.js"></script>
    <script src="./admin-auth.js"></script>
<script src="./admin-ui.js"></script>
<script>
    // 必要に応じて管理者アクセス制御を有効化
    // window.CIDM_ADMIN_AUTH_POLICY = {
    //     allowedEmails: ['admin@example.com'],
    //     requireAdminFlag: true
    // };

    // 必要に応じて管理画面UIテーマを上書き可能
    // window.CIDM_ADMIN_UI_THEME = {
    //     toast: { successBg: '#0f766e', errorBg: '#b91c1c' },
    //     confirm: { confirmBg: '#dc2626', confirmBorder: '#991b1b' },
    //     skeleton: { colorA: '#e2e8f0', colorB: '#f8fafc', speed: '1.1s' }
    // };

    const supabaseClient = window.cidmAdminAuth.createSupabaseClient();

    (async function() {
        await window.cidmAdminAuth.ensureAuthenticated(supabaseClient, 'admin.html');
    })();

    document.getElementById('logout-btn')?.addEventListener('click', async () => {
        window.cidmAdminUi.showToast('ログアウトしました', 'success', 900);
        await window.cidmAdminAuth.signOutAndRedirect(supabaseClient, 'index.html');
    });
</script>
</html>
