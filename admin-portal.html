<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理者ポータル | CIDM</title>
    <link href="./output.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="./nav.js" defer></script>
    <style>
        body { background: #f3f4f6; font-family: 'Noto Sans JP', sans-serif; }
        .container { max-width: 600px; margin: 60px auto; background: #fff; border-radius: 1.5rem; box-shadow: 0 4px 24px #0001; padding: 2.5rem 2rem; }
        h1 { font-size: 2rem; font-weight: bold; color: #374151; margin-bottom: 2rem; }
        .admin-menu { display: flex; flex-direction: column; gap: 1.5rem; }
        .admin-link { display: flex; align-items: center; gap: 1rem; padding: 1.2rem 1.5rem; background: #e5e7eb; border-radius: 1rem; font-size: 1.1rem; color: #374151; font-weight: 500; text-decoration: none; transition: background 0.2s, color 0.2s; }
        .admin-link:hover { background: #d1d5db; color: #111827; }
        .admin-link i { font-size: 1.3rem; }
        .logout-btn { margin-top: 2.5rem; text-align: right; }
        .logout-btn button { background: #6b7280; color: #fff; border: none; padding: 0.7rem 2rem; border-radius: 9999px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .logout-btn button:hover { background: #4b5563; }
    </style>
</head>
<body>
    <div id="nav-placeholder"></div>
    <div class="top-bar" style="width:100%;background:#e5e7eb;color:#374151;padding:0.8rem 0;display:flex;justify-content:space-between;align-items:center;font-size:1.1rem;font-weight:bold;letter-spacing:0.05em; margin-top:80px;">
        <span style="margin-left:2rem;">一般社団法人車両情報活用研究所</span>
        <a href="admin-portal.html" style="margin-right:2rem; color:inherit; text-decoration:none; cursor:pointer;">管理者ポータル</a>
    </div>
    <div class="container">
        <h1><i class="fa-solid fa-user-shield"></i> 管理者ポータル</h1>
        <div class="admin-menu">
            <a href="admin-topics.html" class="admin-link"><i class="fa-solid fa-newspaper"></i> トピック（お知らせ）管理</a>
            <a href="admin-member-list.html" class="admin-link"><i class="fa-solid fa-users"></i> 会員管理</a>
            <a href="#" class="admin-link"><i class="fa-solid fa-database"></i> データベース管理（未定義）</a>
            <a href="#" class="admin-link"><i class="fa-solid fa-gear"></i> サイト設定（未定義）</a>
        </div>
        <div class="logout-btn">
            <button id="logout-btn"><i class="fa-solid fa-right-from-bracket"></i> ログアウト</button>
        </div>
    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./admin-auth.js"></script>
<script src="./admin-ui.js"></script>
<script>
    // 必要に応じて管理者アクセス制御を有効化
    // window.CIDM_ADMIN_AUTH_POLICY = {
    //     allowedEmails: ['admin@example.com'],
    //     requireAdminFlag: true
    // };

    // 必要に応じて管理画面UIテーマを上書き可能
    // window.CIDM_ADMIN_UI_THEME = {
    //     toast: { successBg: '#0f766e', errorBg: '#b91c1c' },
    //     confirm: { confirmBg: '#dc2626', confirmBorder: '#991b1b' },
    //     skeleton: { colorA: '#e2e8f0', colorB: '#f8fafc', speed: '1.1s' }
    // };

    const supabaseClient = window.cidmAdminAuth.createSupabaseClient();

    (async function() {
        await window.cidmAdminAuth.ensureAuthenticated(supabaseClient);
    })();

    document.getElementById('logout-btn')?.addEventListener('click', async () => {
        window.cidmAdminUi.showToast('ログアウトしました', 'success', 900);
        await window.cidmAdminAuth.signOutAndRedirect(supabaseClient);
    });
</script>
</html>
