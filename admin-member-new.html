<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会員新規登録 | 管理者ポータル</title>
    <link rel="icon" type="image/png" href="./CIDMchara.png">
    <link href="./output.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: radial-gradient(1200px 500px at 20% -10%, #dbeafe 0%, transparent 60%), radial-gradient(900px 400px at 85% -5%, #e0e7ff 0%, transparent 55%), #eef2f7; font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; display: flex; flex-direction: column; color: #1e293b; }
        .admin-header { display:flex; align-items:center; justify-content:space-between; padding:0 1.5rem; height:72px; background:rgba(255, 255, 255, 0.78); backdrop-filter:blur(8px); border-bottom:1px solid #dbe4ef; position:sticky; top:0; z-index:10; box-shadow:0 1px 8px rgba(15, 23, 42, 0.06); }
        .brand { display:flex; align-items:center; gap:0.75rem; text-decoration:none; }
        .brand-icon { width:38px; height:38px; background:linear-gradient(135deg,#2563eb,#0ea5e9); border-radius:9px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:1rem; }
        .brand-text { font-size:0.78rem; font-weight:700; color:#64748b; letter-spacing:0.1em; text-transform:uppercase; }
        .brand-text span { display:block; color:#1e293b; font-size:0.9rem; letter-spacing:0.04em; }
        .header-back { display:inline-flex; align-items:center; gap:0.4rem; color:#475569; text-decoration:none; font-size:0.76rem; font-weight:700; letter-spacing:0.06em; border:1px solid #bfdbfe; background:#eff6ff; border-radius:9999px; padding:0.35rem 0.95rem; transition:color 0.15s, border-color 0.15s, background 0.15s; }
        .header-back:hover { color:#1d4ed8; border-color:#93c5fd; background:#dbeafe; }
        .admin-body { flex:1; padding:2.25rem 1.2rem 4rem; max-width:680px; margin:0 auto; width:100%; }
        .form-card { background:#ffffff; border:1px solid #dbe4ef; border-radius:1rem; padding:2rem 2.2rem; box-shadow:0 1px 6px rgba(15, 23, 42, 0.08); }
        .form-heading { margin-bottom:1.8rem; padding-bottom:1.4rem; border-bottom:1px solid #e2e8f0; }
        .form-heading .eyebrow { font-size:0.7rem; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:#3b82f6; margin-bottom:0.35rem; }
        .form-heading h1 { font-size:1.5rem; font-weight:700; color:#1e293b; display:flex; align-items:center; gap:0.5rem; }
        .form-section { margin-bottom:1.8rem; padding-bottom:1.8rem; border-bottom:1px solid #e2e8f0; }
        .form-section:last-of-type { border-bottom:none; margin-bottom:0; }
        .section-label { font-size:0.7rem; font-weight:700; letter-spacing:0.15em; text-transform:uppercase; color:#3b82f6; margin-bottom:1rem; }
        .form-group { margin-bottom:1.2rem; }
        label { display:block; font-size:0.78rem; font-weight:700; color:#64748b; letter-spacing:0.07em; text-transform:uppercase; margin-bottom:0.45rem; }
        input, textarea { width:100%; padding:0.72rem 0.9rem; border-radius:0.6rem; border:1px solid #cbd5e1; background:#f8fbff; color:#1e293b; font-size:0.92rem; font-family:inherit; transition:border-color 0.15s, box-shadow 0.15s; outline:none; }
        input:focus, textarea:focus { border-color:#3b82f6; box-shadow:0 0 0 3px rgba(59,130,246,0.15); }
        textarea { min-height:80px; resize:vertical; }
        .form-actions { display:flex; justify-content:flex-end; gap:0.75rem; margin-top:1.8rem; padding-top:1.4rem; border-top:1px solid #e2e8f0; }
        .btn { padding:0.6rem 1.4rem; border-radius:0.6rem; font-size:0.84rem; font-weight:700; cursor:pointer; transition:opacity 0.15s, transform 0.12s; display:inline-flex; align-items:center; gap:0.35rem; border:none; }
        .btn:hover { transform:translateY(-1px); }
        .btn-submit { background:linear-gradient(135deg,#2563eb,#0ea5e9); color:#fff; box-shadow:0 8px 18px rgba(37, 99, 235, 0.2); }
        .btn-submit:hover { opacity:0.88; }
        .btn-cancel { background:#eff6ff; color:#475569; border:1px solid #bfdbfe; }
        .btn-cancel:hover { background:#dbeafe; color:#1d4ed8; border-color:#93c5fd; }
        .admin-footer { text-align:center; padding:1.25rem; font-size:0.68rem; color:#64748b; letter-spacing:0.08em; text-transform:uppercase; border-top:1px solid #e2e8f0; }
        select { width:100%; padding:0.72rem 0.9rem; border-radius:0.6rem; border:1px solid #cbd5e1; background:#f8fbff; color:#1e293b; font-size:0.92rem; font-family:inherit; transition:border-color 0.15s; outline:none; appearance:none; }
        select:focus { border-color:#3b82f6; box-shadow:0 0 0 3px rgba(59,130,246,0.15); }
        .contact-row { background:#f8fbff; border:1px solid #dbe4ef; border-radius:0.6rem; padding:1rem 1rem 0.4rem; margin-bottom:0.75rem; }
        .contact-row-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:0.75rem; }
        .contact-row-num { font-size:0.68rem; font-weight:700; color:#3b82f6; letter-spacing:0.12em; text-transform:uppercase; }
        .contact-fields { display:grid; grid-template-columns:1fr 1fr; gap:0 1rem; }
        .contact-fields .form-group { margin-bottom:0.9rem; }
        .contact-fields .form-group.full { grid-column:1/-1; }
        .contact-del-btn { background:#fee2e2; border:1px solid #fca5a5; color:#b91c1c; border-radius:0.4rem; padding:0.22rem 0.65rem; font-size:0.72rem; font-weight:700; cursor:pointer; transition:background 0.15s, color 0.15s; }
        .contact-del-btn:hover { background:#fecaca; color:#991b1b; border-color:#ef4444; }
        .contact-primary-label { display:inline-flex; align-items:center; gap:0.4rem; font-size:0.75rem; color:#64748b; cursor:pointer; }
        .contact-primary-label input[type=radio] { accent-color:#3b82f6; }
        .contact-add-btn { display:flex; align-items:center; justify-content:center; gap:0.4rem; width:100%; background:#eff6ff; border:1px dashed #93c5fd; color:#1d4ed8; padding:0.55rem 1rem; border-radius:0.6rem; font-size:0.8rem; font-weight:700; cursor:pointer; transition:background 0.15s, border-color 0.15s; margin-top:0.2rem; }
        .contact-add-btn:hover { background:#dbeafe; border-color:#60a5fa; }
    </style>
</head>
<body>
    <header class="admin-header">
        <a href="admin-portal.html" class="brand">
            <div class="brand-icon"><i class="fa-solid fa-shield-halved"></i></div>
            <div class="brand-text">CIDM <span>管理者ポータル</span></div>
        </a>
        <a href="admin-member-list.html" class="header-back"><i class="fa-solid fa-chevron-left"></i> 会員一覧へ戻る</a>
    </header>

    <div class="admin-body">
        <div class="form-card">
            <div class="form-heading">
                <p class="eyebrow">Member Management</p>
                <h1><i class="fa-solid fa-user-plus"></i> 会員新規登録</h1>
            </div>
            <form id="member-form">
                <div class="form-section">
                    <p class="section-label"><i class="fa-solid fa-building"></i> 会社情報</p>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:0 1rem;">
                        <div class="form-group">
                            <label for="division_flag">区分</label>
                            <select id="division_flag" name="division_flag">
                                <option value="会員" selected>会員</option>
                                <option value="関係者">関係者</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="member_type">会員種別</label>
                            <select id="member_type" name="member_type">
                                <option value="">-- 未設定 --</option>
                                <option value="役員">役員</option>
                                <option value="正会員">正会員</option>
                                <option value="準会員">準会員</option>
                                <option value="賛助">賛助会員</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group"><label for="cidm_role">CIDM役職</label><input type="text" id="cidm_role" name="cidm_role" placeholder="副理事長, 理事, 監事 等"></div>
                    <div class="form-group"><label for="company_name">会社名 <span style="color:#f87171">*</span></label><input type="text" id="company_name" name="company_name" required></div>
                    <div class="form-group"><label for="representative_name">責任者名 <span style="color:#f87171">*</span></label><input type="text" id="representative_name" name="representative_name" required></div>
                    <div class="form-group"><label for="zip_code">郵便番号</label><input type="text" id="zip_code" name="zip_code" placeholder="000-0000"></div>
                    <div class="form-group"><label for="address">住所</label><input type="text" id="address" name="address"></div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:0 1rem;">
                        <div class="form-group"><label for="phone_number">電話番号</label><input type="text" id="phone_number" name="phone_number" placeholder="03-0000-0000"></div>
                        <div class="form-group"><label for="fax_number">FAX番号</label><input type="text" id="fax_number" name="fax_number" placeholder="03-0000-0000"></div>
                    </div>
                    <div class="form-group"><label for="email">Email（会社代表） <span style="color:#f87171">*</span></label><input type="email" id="email" name="email" required></div>
                </div>
                <div class="form-section">
                    <p class="section-label"><i class="fa-solid fa-key"></i> ログイン情報</p>
                    <div class="form-group"><label for="login_id">会員ログインID <span style="color:#f87171">*</span></label><input type="text" id="login_id" name="login_id" required placeholder="member-001"></div>
                    <div class="form-group">
                        <label for="initial_password">初期パスワード <span style="color:#f87171">*</span></label>
                        <div style="position:relative;">
                            <input type="password" id="initial_password" name="initial_password" required minlength="8" placeholder="8文字以上" style="padding-right:4.5rem;">
                            <button type="button" id="initial-password-toggle" style="position:absolute; right:0.6rem; top:50%; transform:translateY(-50%); border:none; background:transparent; color:#64748b; font-size:0.78rem; font-weight:700; cursor:pointer;">表示</button>
                        </div>
                    </div>
                </div>
                <div class="form-section">
                    <p class="section-label"><i class="fa-solid fa-users"></i> 担当者情報</p>
                    <div id="contacts-list"></div>
                    <button type="button" id="add-contact-btn" class="contact-add-btn"><i class="fa-solid fa-plus"></i> 担当者を追加</button>
                    <div class="form-group" style="margin-top:1.2rem;"><label for="biko">備考</label><textarea id="biko" name="biko"></textarea></div>
                </div>
                <div class="form-actions">
                    <button type="button" id="cancel-btn" class="btn btn-cancel">キャンセル</button>
                    <button type="submit" class="btn btn-submit">登録</button>
                </div>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./cidm-config.js"></script>
    <script src="./admin-auth.js"></script>
    <script src="./admin-ui.js"></script>
    <script>
    const supabaseClient = window.cidmAdminAuth.createSupabaseClient();

    const form = document.getElementById('member-form');
    const cancelBtn = document.getElementById('cancel-btn');
    const submitBtn = form.querySelector('.btn-submit');

    const contactsList = document.getElementById('contacts-list');
    const addContactBtn = document.getElementById('add-contact-btn');
    const initialPasswordInput = document.getElementById('initial_password');
    const initialPasswordToggle = document.getElementById('initial-password-toggle');
    initialPasswordToggle?.addEventListener('click', () => {
        const isPassword = initialPasswordInput?.type === 'password';
        if (!initialPasswordInput) return;
        initialPasswordInput.type = isPassword ? 'text' : 'password';
        initialPasswordToggle.textContent = isPassword ? '非表示' : '表示';
    });

    // 担当者行を生成する関数
    let contactIndex = 0;
    function addContactRow(isPrimary = false) {
        const idx = contactIndex++;
        const num = contactsList.children.length + 1;
        const row = document.createElement('div');
        row.className = 'contact-row';
        row.dataset.idx = idx;
        row.innerHTML = `
            <div class="contact-row-header">
                <span class="contact-row-num">担当者 ${num}</span>
                <div style="display:flex;align-items:center;gap:0.8rem;">
                    <label class="contact-primary-label">
                        <input type="radio" name="primary_contact" value="${idx}" ${isPrimary ? 'checked' : ''}> 主担当者
                    </label>
                    <button type="button" class="contact-del-btn" title="削除"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            </div>
            <div class="contact-fields">
                <div class="form-group full"><label>担当者名</label><input type="text" name="contact_name[]" placeholder="山田 太郎"></div>
                <div class="form-group"><label>電話番号</label><input type="text" name="contact_phone[]" placeholder="090-0000-0000"></div>
                <div class="form-group"><label>メールアドレス</label><input type="email" name="contact_email[]"></div>
            </div>
        `;
        row.querySelector('.contact-del-btn').addEventListener('click', () => {
            if (contactsList.children.length <= 1) return;
            const wasPrimary = row.querySelector('input[type=radio]').checked;
            row.remove();
            [...contactsList.children].forEach((r, i) => {
                r.querySelector('.contact-row-num').textContent = `担当者 ${i + 1}`;
            });
            if (wasPrimary && contactsList.children.length > 0) {
                contactsList.children[0].querySelector('input[type=radio]').checked = true;
            }
        });
        contactsList.appendChild(row);
    }

    // 初期1行追加
    addContactRow(true);
    addContactBtn.addEventListener('click', () => addContactRow(false));

    cancelBtn?.addEventListener('click', async () => {
        const accepted = await window.cidmAdminUi.showConfirm('入力内容を破棄して戻りますか？', { confirmText: '戻る' });
        if (!accepted) return;
        window.history.back();
    });

    document.addEventListener('DOMContentLoaded', async () => {
        await window.cidmAdminAuth.ensureAuthenticated(supabaseClient, 'admin.html');
    });

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        await window.cidmAdminUi.runWithButtonBusy(submitBtn, async () => {
            const ok = await window.cidmAdminAuth.ensureAuthenticated(supabaseClient, 'admin.html');
            if (!ok) return;

            // 担当者データ収集
            const contactRows = [...contactsList.querySelectorAll('.contact-row')];
            const primaryIdxVal = parseInt(form.querySelector('input[name=primary_contact]:checked')?.value ?? '-1');
            const contacts = contactRows.map((row, i) => ({
                name:       row.querySelector('input[name="contact_name[]"]').value.trim(),
                phone:      row.querySelector('input[name="contact_phone[]"]').value.trim(),
                email:      row.querySelector('input[name="contact_email[]"]').value.trim(),
                is_primary: parseInt(row.dataset.idx) === primaryIdxVal,
                sort_order: i
            })).filter(c => c.name || c.email);

            const primaryContact = contacts.find(c => c.is_primary) || contacts[0] || {};

            const data = {
                division_flag:       form.division_flag.value || '会員',
                member_type:         form.member_type.value || null,
                cidm_role:           form.cidm_role.value.trim() || null,
                company_name:        form.company_name.value.trim(),
                representative_name: form.representative_name.value.trim(),
                zip_code:            form.zip_code.value.trim(),
                address:             form.address.value.trim(),
                phone_number:        form.phone_number.value.trim(),
                fax_number:          form.fax_number.value.trim() || null,
                email:               form.email.value.trim(),
                staff_name:          primaryContact.name  || null,
                staff_mobile:        primaryContact.phone || null,
                staff_email:         primaryContact.email || null,
                biko:                form.biko.value.trim()
            };
            const loginId = form.login_id.value.trim();
            const initialPassword = form.initial_password.value.trim();

            if (!data.company_name || !data.representative_name || !data.email || !loginId || !initialPassword) {
                window.cidmAdminUi.showToast('必須項目を入力してください。', 'error', 2200);
                return;
            }
            if (initialPassword.length < 8) {
                window.cidmAdminUi.showToast('初期パスワードは8文字以上で入力してください。', 'error', 2600);
                return;
            }

            const { data: insertedMember, error } = await supabaseClient.from('member').insert([data]).select('id').single();
            if (error || !insertedMember) {
                window.cidmAdminUi.showToast('登録に失敗しました: ' + (error?.message || 'unknown error'), 'error', 3000);
                return;
            }

            // ログイン情報設定
            const { error: loginError } = await supabaseClient.rpc('cidm_admin_set_member_login', {
                p_member_id: insertedMember.id,
                p_login_id: loginId,
                p_password: initialPassword
            });
            if (loginError) {
                const loginMessage = String(loginError.message || '');
                if (loginMessage.includes('admin access required')) {
                    window.cidmAdminUi.showToast('認証バイパス中のためログイン情報の登録はスキップしました。', 'info', 2800);
                } else {
                    await supabaseClient.from('member').delete().eq('id', insertedMember.id);
                    window.cidmAdminUi.showToast('ログイン情報の登録に失敗しました: ' + loginError.message, 'error', 3600);
                    return;
                }
            }

            // 担当者登録
            if (contacts.length > 0) {
                const contactsData = contacts.map(c => ({ ...c, member_id: insertedMember.id }));
                const { error: contactError } = await supabaseClient.from('member_contacts').insert(contactsData);
                if (contactError) {
                    window.cidmAdminUi.showToast('担当者情報の登録に失敗しました: ' + contactError.message, 'error', 3600);
                    return;
                }
            }

            window.cidmAdminUi.showToast('登録が完了しました。', 'success', 900);
            setTimeout(() => { window.location.href = 'admin-member-list.html'; }, 500);
        }, '登録中...');
    });
    </script>

    <footer class="admin-footer">© 2013–2026 Center for Innovative Data and Mobility</footer>
</body>
</html>
