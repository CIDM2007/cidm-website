<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会員新規登録 | 管理者ポータル</title>
    <link href="./output.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f3f4f6; font-family: 'Noto Sans JP', sans-serif; }
        .top-bar { width:100%; background:#e5e7eb; color:#374151; padding:0.8rem 0; display:flex; justify-content:space-between; align-items:center; font-size:1.1rem; font-weight:bold; letter-spacing:0.05em; }
        .top-bar span { margin: 0 2rem; }
        .container { max-width: 600px; margin: 60px auto; background: #fff; border-radius: 1.5rem; box-shadow: 0 4px 24px #0001; padding: 2.5rem 2rem; }
        .title-bar {
            background: linear-gradient(90deg, #e5e7eb 70%, #f3f4f6 100%);
            color: #374151;
            border-radius: 1rem 1rem 0 0;
            padding: 1.1rem 2rem 1.1rem 2rem;
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.7rem;
            box-shadow: 0 2px 8px #0001;
            letter-spacing: 0.03em;
        }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; font-weight: 500; color: #374151; margin-bottom: 0.5rem; }
        input, textarea { width: 100%; padding: 0.7rem; border-radius: 0.7rem; border: 1px solid #d1d5db; background: #f9fafb; font-size: 1rem; }
        .form-actions { text-align: right; }
        .btn { padding: 0.6rem 1.5rem; border-radius: 0.7rem; border: none; font-weight: 500; cursor: pointer; transition: background 0.2s; }
        .btn-submit { background: #6b7280; color: #fff; }
        .btn-submit:hover { background: #4b5563; }
        .btn-cancel { background: #e5e7eb; color: #374151; margin-right: 1rem; }
        .btn-cancel:hover { background: #d1d5db; }
    </style>
</head>
<body>
    <div class="top-bar">
        <span>一般社団法人車両情報活用研究所</span>
        <a href="admin-portal.html" style="color:inherit; text-decoration:none; cursor:pointer;">管理者ポータル</a>
    </div>
    <div class="container">
        <div class="title-bar"><i class="fa-solid fa-user-plus"></i> 会員新規登録</div>
        <form id="member-form">
            <div class="form-group"><label for="company_name">会社名</label><input type="text" id="company_name" name="company_name" required></div>
            <div class="form-group"><label for="representative_name">責任者名</label><input type="text" id="representative_name" name="representative_name" required></div>
            <div class="form-group"><label for="zip_code">郵便番号</label><input type="text" id="zip_code" name="zip_code"></div>
            <div class="form-group"><label for="address">住所</label><input type="text" id="address" name="address"></div>
            <div class="form-group"><label for="phone_number">電話番号</label><input type="text" id="phone_number" name="phone_number"></div>
            <div class="form-group"><label for="email">Email</label><input type="email" id="email" name="email" required></div>
            <div class="form-group"><label for="login_id">会員ログインID</label><input type="text" id="login_id" name="login_id" required placeholder="member-001"></div>
            <div class="form-group"><label for="initial_password">初期パスワード</label><input type="password" id="initial_password" name="initial_password" required minlength="8" placeholder="8文字以上"></div>
            <div class="form-group"><label for="staff_name">担当者</label><input type="text" id="staff_name" name="staff_name"></div>
            <div class="form-group"><label for="staff_mobile">担当者携帯</label><input type="text" id="staff_mobile" name="staff_mobile"></div>
            <div class="form-group"><label for="staff_email">担当者メルアド</label><input type="email" id="staff_email" name="staff_email"></div>
            <div class="form-group"><label for="biko">備考</label><textarea id="biko" name="biko"></textarea></div>
            <div class="form-actions">
                <button type="button" id="cancel-btn" class="btn btn-cancel">キャンセル</button>
                <button type="submit" class="btn btn-submit">登録</button>
            </div>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./admin-auth.js"></script>
    <script src="./admin-ui.js"></script>
    <script>
    const supabaseClient = window.cidmAdminAuth.createSupabaseClient();

    const form = document.getElementById('member-form');
    const cancelBtn = document.getElementById('cancel-btn');
    const submitBtn = form.querySelector('.btn-submit');

    cancelBtn?.addEventListener('click', async () => {
        const accepted = await window.cidmAdminUi.showConfirm('入力内容を破棄して戻りますか？', { confirmText: '戻る' });
        if (!accepted) return;
        window.history.back();
    });

    document.addEventListener('DOMContentLoaded', async () => {
        await window.cidmAdminAuth.ensureAuthenticated(supabaseClient);
    });

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        await window.cidmAdminUi.runWithButtonBusy(submitBtn, async () => {
            const ok = await window.cidmAdminAuth.ensureAuthenticated(supabaseClient);
            if (!ok) return;

            const data = {
                company_name: form.company_name.value.trim(),
                representative_name: form.representative_name.value.trim(),
                zip_code: form.zip_code.value.trim(),
                address: form.address.value.trim(),
                phone_number: form.phone_number.value.trim(),
                email: form.email.value.trim(),
                staff_name: form.staff_name.value.trim(),
                staff_mobile: form.staff_mobile.value.trim(),
                staff_email: form.staff_email.value.trim(),
                biko: form.biko.value.trim()
            };
            const loginId = form.login_id.value.trim();
            const initialPassword = form.initial_password.value.trim();

            if (!data.company_name || !data.representative_name || !data.email || !loginId || !initialPassword) {
                window.cidmAdminUi.showToast('必須項目を入力してください。', 'error', 2200);
                return;
            }
            if (initialPassword.length < 8) {
                window.cidmAdminUi.showToast('初期パスワードは8文字以上で入力してください。', 'error', 2600);
                return;
            }

            const { data: insertedMember, error } = await supabaseClient.from('member').insert([data]).select('id').single();
            if (error || !insertedMember) {
                window.cidmAdminUi.showToast('登録に失敗しました: ' + (error?.message || 'unknown error'), 'error', 3000);
                return;
            }

            const { error: loginError } = await supabaseClient.rpc('cidm_admin_set_member_login', {
                p_member_id: insertedMember.id,
                p_login_id: loginId,
                p_password: initialPassword
            });

            if (loginError) {
                await supabaseClient.from('member').delete().eq('id', insertedMember.id);
                window.cidmAdminUi.showToast('ログイン情報の登録に失敗しました: ' + loginError.message, 'error', 3600);
                return;
            }

            window.cidmAdminUi.showToast('登録が完了しました。', 'success', 900);
            setTimeout(() => { window.location.href = 'admin-members.html'; }, 500);
        }, '登録中...');
    });
    </script>
</body>
</html>
