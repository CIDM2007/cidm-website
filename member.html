<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会員ポータル | CIDM Official</title>
    <link rel="icon" type="image/png" href="./CIDMchara.png">
    <link href="./output.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="./cidm-config.js"></script>
    <script src="./nav.js" defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@500;700&display=swap');

        .member-serif {
            font-family: 'Noto Serif JP', serif;
        }

        .member-hero {
            background: linear-gradient(125deg, #0b1f4d 0%, #143a8f 52%, #3b82f6 100%);
        }

        .member-grid-card {
            border: 1px solid #e2e8f0;
            border-radius: 1.25rem;
            background: #ffffff;
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.06);
        }

        .member-hero-office-card {
            width: min(100%, 340px);
            border: 1px solid rgba(191, 219, 254, 0.5);
            border-radius: 1.25rem;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(6px);
            padding: 1rem;
        }

        .member-news-card {
            min-height: 34rem;
        }

        @media (min-width: 1024px) {
            .member-news-card {
                min-height: 42rem;
            }
        }
    </style>
</head>
<body class="bg-white" data-nav-current="member">
    <div id="nav-placeholder"></div>
    <main class="pt-20">
        <section class="member-hero text-white py-16 md:py-20">
            <div class="max-w-7xl mx-auto px-6">
                <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-8">
                    <div>
                        <p class="text-blue-100 tracking-[0.18em] text-xs uppercase mb-3">CIDM Members Portal</p>
                        <h1 class="member-serif text-4xl md:text-5xl font-bold leading-tight">会員ポータル</h1>
                        <p class="mt-4 text-blue-100 max-w-2xl leading-relaxed">
                            研究会活動に必要な資料・最新連絡・各種申請を、会員向けに集約しています。
                        </p>
                        <p id="member-greeting" class="mt-4 text-sm text-blue-100/90"></p>
                    </div>
                    <aside class="member-hero-office-card self-start md:self-auto">
                        <div class="flex items-start justify-between gap-3 mb-3">
                            <h2 class="text-base font-bold">事務局より</h2>
                            <button id="member-logout-btn" class="inline-flex items-center justify-center gap-1.5 px-3 py-1.5 text-xs rounded-full bg-white text-slate-800 font-bold hover:bg-blue-50 transition">
                                <i class="fa-solid fa-right-from-bracket"></i> ログアウト
                            </button>
                        </div>
                        <p class="text-sm text-blue-100 leading-relaxed mb-3">
                            会員情報の更新や請求関連のお問い合わせは、以下の窓口までご連絡ください。
                        </p>
                        <div class="rounded-xl border border-blue-200/50 bg-white/10 p-3 text-sm text-blue-50 space-y-1.5">
                            <p><i class="fa-solid fa-envelope mr-2"></i> office@cidm.or.jp</p>
                            <p><i class="fa-solid fa-phone mr-2"></i> 03-0000-0000（平日 10:00-17:00）</p>
                        </div>
                    </aside>
                </div>
            </div>
        </section>

        <section class="bg-slate-50 py-14 md:py-16 min-h-screen">
            <div class="max-w-7xl mx-auto px-6">
                <div class="grid grid-cols-1 gap-6 items-start">
                    <article class="member-grid-card member-news-card p-7">
                        <div class="flex items-center justify-between mb-5">
                            <h2 class="text-2xl font-bold text-slate-800">会議の報告</h2>
                            <a href="archive.html" class="text-sm font-bold text-blue-600 hover:text-blue-700">一覧を見る</a>
                        </div>
                        <div id="member-news-list" class="space-y-4">
                            <p class="text-sm text-slate-500">会議の報告を読み込み中です...</p>
                        </div>
                    </article>
                </div>
            </div>
        </section>
    </main>
    <footer class="bg-slate-900 text-slate-400 py-16 text-center">
        <p class="text-[10px] tracking-tighter uppercase">© 2013-2026 Center for Innovative Data and Mobility.</p>
    </footer>
    <script>
        const MEMBER_AUTH_KEY = 'cidm-member-auth';
        const MEMBER_ID_KEY = 'cidm-member-id';
        const MEMBER_NAME_KEY = 'cidm-member-name';
        const MEMBER_COMPANY_KEY = 'cidm-member-company';
        const EDGE_FUNCTION_URL = 'https://uhhhifbotqidqeceqyis.supabase.co/functions/v1/get-member-data';

        const fallbackNewsItems = [
            {
                date: '2026-04-18',
                title: '4月度定例会報告（ハイブリッド開催）',
                summary: '研究会全体の進捗共有と、次期実証実験の論点整理を実施しました。',
                details: '会場参加とオンライン参加を併用し、各分科会から直近の成果報告を共有。次回までのアクションとして、データ連携手順の標準化案を取りまとめる方針で合意しました。',
                participants: '32名（会場18名 / オンライン14名）',
                attachments: [
                    { name: '会議資料_20260418.pdf', url: '#' },
                    { name: '議事録_20260418.pdf', url: '#' }
                ]
            },
            {
                date: '2026-04-04',
                title: '第1回運営会議報告',
                summary: '年度計画の確認と、会員向け情報発信の改善案を協議しました。',
                details: '年間スケジュールの見直し、会議報告の公開フォーマット統一、配布資料管理フローの更新を決定しました。',
                participants: '18名',
                attachments: [
                    { name: '会議報告スライド_20260404.pdf', url: '#' }
                ]
            },
            {
                date: '2026-03-22',
                title: '3月度定例会報告',
                summary: '車両情報活用に関する最新動向を共有しました。',
                details: '事業者ヒアリング結果と実証プロジェクトの中間報告を実施。次回までに追加検証項目を整理することになりました。',
                participants: '26名',
                attachments: []
            }
        ];

        const memberId = sessionStorage.getItem(MEMBER_ID_KEY) || '';
        const memberName = sessionStorage.getItem(MEMBER_NAME_KEY) || '';
        const memberCompany = sessionStorage.getItem(MEMBER_COMPANY_KEY) || '';
        const greeting = document.getElementById('member-greeting');
        if (greeting) {
            if (memberName) {
                greeting.textContent = `${memberCompany || memberId} / ${memberName} 様、ようこそ。`;
            } else if (memberId) {
                greeting.textContent = `${memberId} 様、ようこそ。`;
            } else {
                greeting.textContent = '会員向け情報を表示しています。';
            }
        }

        function formatDate(dateString) {
            if (!dateString) return '';
            const d = new Date(dateString);
            if (isNaN(d.getTime())) return dateString.replace(/-/g, '.');
            const pad = n => String(n).padStart(2, '0');
            const timePart = (d.getHours() || d.getMinutes()) ? ` ${pad(d.getHours())}:${pad(d.getMinutes())}` : '';
            return `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())}${timePart}`;
        }

        function sanitizeText(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function sanitizeUrl(url) {
            if (!url) return '#';
            try {
                const parsed = new URL(String(url), window.location.origin);
                const protocol = parsed.protocol.toLowerCase();
                if (protocol === 'http:' || protocol === 'https:') {
                    return parsed.href;
                }
            } catch {
                return '#';
            }
            return '#';
        }

        function parseDateValue(value) {
            if (!value) return Number.NEGATIVE_INFINITY;
            const parsed = Date.parse(value);
            return Number.isNaN(parsed) ? Number.NEGATIVE_INFINITY : parsed;
        }

        function normalizeParticipants(value) {
            if (Array.isArray(value)) {
                return value.join('、');
            }
            return value ? String(value) : '未記載';
        }

        function normalizeAttachments(value) {
            if (!value) return [];
            if (Array.isArray(value)) {
                return value.map((item) => {
                    if (typeof item === 'string') {
                        return { name: item, url: '#' };
                    }
                    return {
                        name: item?.name || item?.file_name || item?.title || '添付ファイル',
                        url: item?.url || item?.file_url || '#'
                    };
                });
            }
            if (typeof value === 'string') {
                return [{ name: value, url: '#' }];
            }
            return [];
        }

        function normalizeMeetingReport(item) {
            return {
                date: item.event_date || item.date || item.report_date || '',
                title: item.title || item.subject || '会議報告',
                summary: item.summary || item.details || item.outline || '',
                details: item.detail_text || item.details_long || item.detail || item.details || '',
                participants: normalizeParticipants(item.participants || item.attendees || item.participant_count),
                attachments: normalizeAttachments(item.attachment_urls || item.attachments || item.files || item.attachment_files)
            };
        }

        function renderNews(items) {
            const container = document.getElementById('member-news-list');
            if (!container) return;

            const reports = items
                .map(normalizeMeetingReport)
                .sort((a, b) => parseDateValue(b.date) - parseDateValue(a.date));

            if (!reports.length) {
                container.innerHTML = '<p class="text-sm text-slate-500">現在会議の報告はありません。</p>';
                return;
            }

            container.innerHTML = reports.map((report) => {
                const title = sanitizeText(report.title || '会議報告');
                const summary = report.summary ? sanitizeText(report.summary).replace(/\n/g, '<br>') : '未記載';
                const details = report.details ? sanitizeText(report.details).replace(/\n/g, '<br>') : '未記載';
                const participants = sanitizeText(report.participants || '未記載');
                const date = sanitizeText(formatDate(report.date) || '未設定');
                const attachmentsHtml = report.attachments.length
                    ? report.attachments.map((attachment) => `
                        <a href="${sanitizeUrl(attachment.url || '#')}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center rounded-full border border-blue-200 px-3 py-1 text-xs font-bold text-blue-700 hover:bg-blue-50 transition">
                            <i class="fa-solid fa-paperclip mr-1.5"></i>${sanitizeText(attachment.name || '添付ファイル')}
                        </a>
                    `).join('')
                    : '<span class="text-xs text-slate-500">なし</span>';

                return `
                    <article class="rounded-xl border border-slate-100 p-5 hover:border-blue-200 hover:bg-blue-50/20 transition">
                        <div class="flex flex-wrap items-center gap-x-4 gap-y-1 mb-2">
                            <p class="text-xs font-bold text-blue-700 tracking-wide">日付: ${date}</p>
                            <p class="text-xs text-slate-500">参加者: ${participants}</p>
                        </div>
                        <h3 class="text-slate-800 font-bold text-lg">${title}</h3>
                        <div class="mt-3">
                            <p class="text-[11px] font-bold text-blue-700 tracking-wide">概要</p>
                            <p class="text-sm text-slate-600 leading-relaxed mt-1">${summary}</p>
                        </div>
                        <div class="mt-3">
                            <p class="text-[11px] font-bold text-blue-700 tracking-wide">詳細</p>
                            <p class="text-sm text-slate-700 leading-relaxed mt-1">${details}</p>
                        </div>
                        <div class="mt-3">
                            <p class="text-[11px] font-bold text-blue-700 tracking-wide mb-1.5">添付ファイル</p>
                            <div class="flex flex-wrap gap-2">
                                ${attachmentsHtml}
                            </div>
                        </div>
                    </article>
                `;
            }).join('');
        }

        function renderNewsError(message) {
            const container = document.getElementById('member-news-list');
            if (!container) return;
            container.innerHTML = `<p class="text-sm text-rose-600">${sanitizeText(message)}</p>`;
        }

        async function fetchWithTimeout(url, options = {}, timeoutMs = 12000) {
            const controller = new AbortController();
            const timeoutId = window.setTimeout(() => controller.abort(), timeoutMs);
            try {
                const response = await fetch(url, { ...options, signal: controller.signal });
                return response;
            } finally {
                window.clearTimeout(timeoutId);
            }
        }

        async function fetchMemberNewsViaRest() {
            const supabaseUrl = window.CIDM_SUPABASE_URL || '';
            const anonKey = window.CIDM_SUPABASE_ANON_KEY || '';
            if (!supabaseUrl || !anonKey) {
                throw new Error('Missing Supabase config');
            }

            const url = `${supabaseUrl}/rest/v1/meeting_reports?select=event_date,title,details,detail_text,attachment_urls,is_visible&is_visible=eq.true&order=event_date.desc&limit=3`;
            const response = await fetchWithTimeout(url, {
                headers: {
                    apikey: anonKey,
                    Authorization: `Bearer ${anonKey}`
                }
            }, 12000);

            if (!response.ok) {
                throw new Error('REST fallback failed');
            }

            const data = await response.json();
            return Array.isArray(data) ? data : [];
        }

        async function loadMemberNews() {
            try {
                const response = await fetchWithTimeout(EDGE_FUNCTION_URL, {}, 8000);
                if (!response.ok) throw new Error('Edge function failed');
                const data = await response.json();
                renderNews(data.news || []);
            } catch (error) {
                console.error('会議報告の取得に失敗しました:', error);
                try {
                    const restNews = await fetchMemberNewsViaRest();
                    renderNews(restNews);
                } catch (fallbackError) {
                    console.error('RESTフォールバックでも取得に失敗しました:', fallbackError);
                    renderNews(fallbackNewsItems);
                }
            }
        }

        document.getElementById('member-logout-btn')?.addEventListener('click', () => {
            handleLogout();
        });

        function handleLogout() {
            sessionStorage.removeItem(MEMBER_AUTH_KEY);
            sessionStorage.removeItem(MEMBER_ID_KEY);
            sessionStorage.removeItem(MEMBER_NAME_KEY);
            sessionStorage.removeItem(MEMBER_COMPANY_KEY);
            alert('ログアウトしました。');
            // AUTH_BYPASS_START — 認証スキップ中
            window.location.href = 'index.html';
            // AUTH_BYPASS_END
        }

        loadMemberNews();
    </script>
</body>
</html>
