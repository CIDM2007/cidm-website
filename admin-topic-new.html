<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>トピック新規登録 | 管理者ポータル</title>
    <link rel="icon" type="image/png" href="./CIDMchara.png">
    <link href="./output.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: radial-gradient(1200px 500px at 20% -10%, #dbeafe 0%, transparent 60%), radial-gradient(900px 400px at 85% -5%, #e0e7ff 0%, transparent 55%), #eef2f7; font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; display: flex; flex-direction: column; color: #1e293b; }
        .admin-header { display:flex; align-items:center; justify-content:space-between; padding:0 1.5rem; height:72px; background:rgba(255, 255, 255, 0.78); backdrop-filter:blur(8px); border-bottom:1px solid #dbe4ef; position:sticky; top:0; z-index:10; box-shadow:0 1px 8px rgba(15, 23, 42, 0.06); }
        .brand { display:flex; align-items:center; gap:0.75rem; text-decoration:none; }
        .brand-icon { width:38px; height:38px; background:linear-gradient(135deg,#2563eb,#0ea5e9); border-radius:9px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:1rem; }
        .brand-text { font-size:0.78rem; font-weight:700; color:#64748b; letter-spacing:0.1em; text-transform:uppercase; }
        .brand-text span { display:block; color:#1e293b; font-size:0.9rem; letter-spacing:0.04em; }
        .header-back { display:inline-flex; align-items:center; gap:0.4rem; color:#475569; text-decoration:none; font-size:0.76rem; font-weight:700; letter-spacing:0.06em; border:1px solid #bfdbfe; background:#eff6ff; border-radius:9999px; padding:0.35rem 0.95rem; transition:color 0.15s, border-color 0.15s, background 0.15s; }
        .header-back:hover { color:#1d4ed8; border-color:#93c5fd; background:#dbeafe; }
        .admin-body { flex:1; padding:2.25rem 1.2rem 4rem; max-width:680px; margin:0 auto; width:100%; }
        .form-card { background:#ffffff; border:1px solid #dbe4ef; border-radius:1rem; padding:2rem 2.2rem; box-shadow:0 1px 6px rgba(15, 23, 42, 0.08); }
        .form-heading { margin-bottom:1.8rem; }
        .eyebrow { font-size:0.7rem; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:#3b82f6; margin-bottom:0.35rem; }
        h1 { font-size:1.5rem; font-weight:700; color:#1e293b; display:flex; align-items:center; gap:0.5rem; }
        .form-group { margin-bottom:1.4rem; }
        label { display:block; font-size:0.78rem; font-weight:700; color:#64748b; letter-spacing:0.07em; text-transform:uppercase; margin-bottom:0.45rem; }
        input, textarea, select { width:100%; padding:0.72rem 0.9rem; border-radius:0.6rem; border:1px solid #cbd5e1; background:#f8fbff; color:#1e293b; font-size:0.92rem; font-family:inherit; transition:border-color 0.15s, box-shadow 0.15s; outline:none; }
        input:focus, textarea:focus, select:focus { border-color:#3b82f6; box-shadow:0 0 0 3px rgba(59,130,246,0.15); }
        textarea { min-height: 120px; resize: vertical; }
        .form-actions { display:flex; justify-content:flex-end; gap:0.75rem; margin-top:1.8rem; padding-top:1.4rem; border-top:1px solid #e2e8f0; }
        .btn { padding:0.6rem 1.4rem; border-radius:0.6rem; font-size:0.84rem; font-weight:700; cursor:pointer; transition:opacity 0.15s, transform 0.12s; display:inline-flex; align-items:center; gap:0.35rem; border:none; }
        .btn:hover { transform:translateY(-1px); }
        .btn-submit { background:linear-gradient(135deg,#2563eb,#0ea5e9); color:#fff; box-shadow:0 8px 18px rgba(37, 99, 235, 0.2); }
        .btn-submit:hover { opacity:0.88; }
        .btn-cancel { background:#eff6ff; color:#475569; border:1px solid #bfdbfe; }
        .btn-cancel:hover { background:#dbeafe; color:#1d4ed8; border-color:#93c5fd; }
        .admin-footer { text-align:center; padding:1.25rem; font-size:0.68rem; color:#64748b; letter-spacing:0.08em; text-transform:uppercase; border-top:1px solid #e2e8f0; }
        .file-help { font-size:0.74rem; color:#64748b; margin-top:0.4rem; }
        .photo-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:0.8rem; margin-top:0.5rem; }
        .photo-slot-wrapper { display:flex; flex-direction:column; gap:0.3rem; }
        .photo-slot { border-radius:0.6rem; overflow:hidden; aspect-ratio:4/3; border:2px dashed #cbd5e1; background:#f8fbff; position:relative; transition:border-color 0.15s, background 0.15s; }
        .photo-slot--empty { display:flex; align-items:center; justify-content:center; cursor:pointer; }
        .photo-slot--empty:hover { border-color:#3b82f6; background:#eff6ff; }
        .photo-add-label { display:flex; flex-direction:column; align-items:center; gap:0.3rem; color:#94a3b8; font-size:0.72rem; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; width:100%; height:100%; justify-content:center; pointer-events:none; }
        .photo-add-label i { font-size:1.3rem; }
        .photo-slot--empty:hover .photo-add-label { color:#3b82f6; }
        .photo-slot--filled img { width:100%; height:100%; object-fit:cover; display:block; }
        .photo-remove { position:absolute; top:4px; right:4px; background:rgba(0,0,0,0.55); color:#fff; border:none; border-radius:50%; width:22px; height:22px; font-size:0.7rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background 0.15s; z-index:1; }
        .photo-remove:hover { background:rgba(185,28,28,0.85); }
        .photo-new-badge { position:absolute; bottom:4px; left:4px; background:#2563eb; color:#fff; font-size:0.62rem; font-weight:700; padding:1px 6px; border-radius:9999px; letter-spacing:0.05em; pointer-events:none; }
        .photo-caption { width:100%; padding:0.3rem 0.5rem; border-radius:0.4rem; border:1px solid #cbd5e1; background:#f8fbff; color:#1e293b; font-size:0.78rem; font-family:inherit; outline:none; transition:border-color 0.15s; }
        .photo-caption:focus { border-color:#3b82f6; box-shadow:0 0 0 2px rgba(59,130,246,0.12); }
        .photo-caption::placeholder { color:#94a3b8; }
    </style>
</head>
<body>
    <header class="admin-header">
        <a href="admin-portal.html" class="brand">
            <div class="brand-icon"><i class="fa-solid fa-shield-halved"></i></div>
            <div class="brand-text">CIDM <span>管理者ポータル</span></div>
        </a>
        <a href="admin-topics.html" class="header-back"><i class="fa-solid fa-chevron-left"></i> トピック管理へ戻る</a>
    </header>
    <div class="admin-body">
        <div class="form-card">
        <div class="form-heading">
            <p class="eyebrow">Content Management</p>
            <h1><i class="fa-solid fa-plus"></i> トピック新規登録</h1>
        </div>
        <form id="topic-form">
            <div class="form-group">
                <label for="title">タイトル</label>
                <input type="text" id="title" name="title" required>
            </div>
            <div class="form-group">
                <label for="event_date">日時</label>
                <input type="datetime-local" id="event_date" name="event_date" required>
            </div>
            <div class="form-group">
                <label for="is_visible">公開設定</label>
                <select id="is_visible" name="is_visible">
                    <option value="true">公開</option>
                    <option value="false">非公開</option>
                </select>
            </div>
            <div class="form-group">
                <label for="details">詳細内容</label>
                <textarea id="details" name="details" required></textarea>
            </div>
            <div class="form-group">
                <label>写真（最大12枚）</label>
                <div id="photo-grid" class="photo-grid"></div>
                <p class="file-help">各スロットをクリックして画像を選択。JPG・PNG・GIF・WEBP 対応。</p>
            </div>
            <input type="file" id="photo-file-input" accept="image/*" style="display:none">
            <div class="form-actions">
                <button type="button" id="cancel-btn" class="btn btn-cancel">キャンセル</button>
                <button type="submit" class="btn btn-submit">登録</button>
            </div>
        </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./cidm-config.js"></script>
    <script src="./admin-auth.js"></script>
    <script src="./admin-ui.js"></script>
    <script>
    const supabaseClient = window.cidmAdminAuth.createSupabaseClient();

    const form = document.getElementById('topic-form');
    const cancelBtn = document.getElementById('cancel-btn');
    const submitBtn = form.querySelector('.btn-submit');
    const STORAGE_BUCKET = 'meeting-report-assets';
    const PHOTO_SLOT_COUNT = 12;
    let photoSlots = Array(PHOTO_SLOT_COUNT).fill(null);
    let currentPhotoSlot = -1;
    const photoFileInput = document.getElementById('photo-file-input');
    const photoGrid = document.getElementById('photo-grid');

    function escapeHtml(v) {
        return String(v || '')
            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function captureCurrentCaptions() {
        if (!photoGrid) return;
        photoGrid.querySelectorAll('.photo-caption').forEach(input => {
            const idx = Number(input.dataset.slot);
            if (photoSlots[idx]) photoSlots[idx].caption = input.value;
        });
    }

    function renderPhotoSlots() {
        if (!photoGrid) return;
        photoGrid.innerHTML = photoSlots.map((slot, i) => {
            if (slot && slot.type === 'new') {
                const escapedUrl = slot.previewUrl.replace(/"/g, '&quot;');
                const safeCaption = escapeHtml(slot.caption || '');
                return `<div class="photo-slot-wrapper"><div class="photo-slot photo-slot--filled" data-slot="${i}"><img src="${escapedUrl}" alt="写真${i+1}"><button type="button" class="photo-remove" data-slot="${i}"><i class="fa-solid fa-xmark"></i></button><span class="photo-new-badge">新規</span></div><input type="text" class="photo-caption" data-slot="${i}" value="${safeCaption}" placeholder="コメント（任意）"></div>`;
            } else {
                return `<div class="photo-slot-wrapper"><div class="photo-slot photo-slot--empty" data-slot="${i}"><div class="photo-add-label"><i class="fa-solid fa-plus"></i><span>写真${i+1}</span></div></div></div>`;
            }
        }).join('');
    }

    async function uploadPhotoSlots() {
        const results = [];
        for (let i = 0; i < photoSlots.length; i++) {
            const slot = photoSlots[i];
            if (!slot) continue;
            const captionInput = photoGrid?.querySelector(`.photo-caption[data-slot="${i}"]`);
            const caption = captionInput?.value.trim() || '';
            const safeName = slot.file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
            const path = `topics/photos/${Date.now()}-${Math.random().toString(36).slice(2, 8)}-${safeName}`;
            const { error } = await supabaseClient.storage.from(STORAGE_BUCKET).upload(path, slot.file, { upsert: false });
            if (error) throw new Error(`写真のアップロードに失敗しました: ${error.message}`);
            const { data } = supabaseClient.storage.from(STORAGE_BUCKET).getPublicUrl(path);
            results.push({ url: data.publicUrl, caption });
        }
        return results;
    }

    photoGrid?.addEventListener('click', (e) => {
        const removeBtn = e.target.closest('.photo-remove');
        if (removeBtn) {
            captureCurrentCaptions();
            const idx = Number(removeBtn.dataset.slot);
            if (photoSlots[idx]?.type === 'new') URL.revokeObjectURL(photoSlots[idx].previewUrl);
            photoSlots[idx] = null;
            renderPhotoSlots();
            return;
        }
        const emptySlot = e.target.closest('.photo-slot--empty');
        if (emptySlot) {
            currentPhotoSlot = Number(emptySlot.dataset.slot);
            photoFileInput?.click();
        }
    });

    photoFileInput?.addEventListener('change', (e) => {
        const file = e.target.files?.[0];
        photoFileInput.value = '';
        if (!file || currentPhotoSlot < 0 || currentPhotoSlot >= PHOTO_SLOT_COUNT) return;
        if (!file.type.startsWith('image/')) {
            window.cidmAdminUi.showToast('画像ファイルを選択してください。', 'error', 2200);
            return;
        }
        captureCurrentCaptions();
        const previewUrl = URL.createObjectURL(file);
        photoSlots[currentPhotoSlot] = { type: 'new', file, previewUrl, caption: '' };
        currentPhotoSlot = -1;
        renderPhotoSlots();
    });

    cancelBtn?.addEventListener('click', async () => {
        const accepted = await window.cidmAdminUi.showConfirm('入力内容を破棄して戻りますか？', { confirmText: '戻る' });
        if (!accepted) return;
        window.history.back();
    });

    document.addEventListener('DOMContentLoaded', async () => {
        await window.cidmAdminAuth.ensureAuthenticated(supabaseClient, 'admin.html');
        renderPhotoSlots();
    });

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        await window.cidmAdminUi.runWithButtonBusy(submitBtn, async () => {
            const ok = await window.cidmAdminAuth.ensureAuthenticated(supabaseClient, 'admin.html');
            if (!ok) return;

            const title = form.title.value.trim();
            const event_date = form.event_date.value;
            const is_visible = form.is_visible.value === 'true';
            const category = '会議報告';
            const details = form.details.value.trim();
            if (!title || !event_date || !details) {
                window.cidmAdminUi.showToast('全ての項目を入力してください。', 'error', 2200);
                return;
            }

            const photo_urls = await uploadPhotoSlots();

            const { error } = await supabaseClient
                .from('meeting_reports')
                .insert([{ title, category, event_date, is_visible, details, photo_urls }]);
            if (error) {
                window.cidmAdminUi.showToast('登録に失敗しました: ' + error.message, 'error', 3000);
            } else {
                window.cidmAdminUi.showToast('登録が完了しました。', 'success', 900);
                setTimeout(() => { window.location.href = 'admin-topics.html'; }, 500);
            }
        }, '登録中...');
    });
    </script>
    <footer class="admin-footer">© 2013–2026 Center for Innovative Data and Mobility</footer>
</body>
</html>
