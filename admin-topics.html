<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>トピック管理 | 管理者ポータル</title>
    <link rel="icon" type="image/png" href="./CIDMchara.png">
    <link href="./output.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background:
                radial-gradient(1200px 500px at 20% -10%, #dbeafe 0%, transparent 60%),
                radial-gradient(900px 400px at 85% -5%, #e0e7ff 0%, transparent 55%),
                #eef2f7;
            font-family: 'Noto Sans JP', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #1e293b;
        }

        /* Header */
        .admin-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            height: 72px;
            background: rgba(255, 255, 255, 0.78);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid #dbe4ef;
            position: sticky;
            top: 0;
            z-index: 10;
            box-shadow: 0 1px 8px rgba(15, 23, 42, 0.06);
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }
        .brand-icon {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, #2563eb, #0ea5e9);
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1rem;
        }
        .brand-text {
            font-size: 0.78rem;
            font-weight: 700;
            color: #64748b;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .brand-text span {
            display: block;
            color: #1e293b;
            font-size: 0.9rem;
            letter-spacing: 0.04em;
        }
        .header-back {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: #eff6ff;
            color: #475569;
            border: 1px solid #bfdbfe;
            border-radius: 9999px;
            padding: 0.35rem 0.95rem;
            text-decoration: none;
            font-size: 0.76rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            transition: color 0.15s, border-color 0.15s, background 0.15s;
        }
        .header-back:hover {
            color: #1d4ed8;
            border-color: #93c5fd;
            background: #dbeafe;
        }

        /* Body */
        .admin-body {
            flex: 1;
            padding: 2.25rem 1.2rem 4rem;
            max-width: 980px;
            margin: 0 auto;
            width: 100%;
        }

        /* Page heading */
        .page-heading {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 1.3rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .page-heading .left .eyebrow {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #3b82f6;
            margin-bottom: 0.35rem;
        }
        .page-heading .left h1 {
            font-size: clamp(1.55rem, 2.2vw, 1.95rem);
            font-weight: 700;
            color: #1e293b;
        }

        /* New button */
        .btn-new {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: linear-gradient(135deg, #2563eb, #0ea5e9);
            color: #fff;
            border: none;
            padding: 0.65rem 1.4rem;
            border-radius: 9999px;
            font-size: 0.84rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.12s;
            box-shadow: 0 8px 18px rgba(37, 99, 235, 0.2);
        }
        .btn-new:hover {
            opacity: 0.92;
            transform: translateY(-1px);
        }

        /* Table card */
        .table-card {
            background: #ffffff;
            border: 1px solid #dbe4ef;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 1px 6px rgba(15, 23, 42, 0.08);
        }
        .topic-table {
            width: 100%;
            border-collapse: collapse;
        }
        .topic-table th {
            background: #f8fbff;
            color: #64748b;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 0.85rem 1rem;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        .topic-table td {
            padding: 0.9rem 1rem;
            border-bottom: 1px solid #edf2f7;
            vertical-align: top;
            color: #334155;
            font-size: 0.9rem;
        }
        .topic-table tbody tr:last-child td {
            border-bottom: none;
        }
        .topic-table tbody tr.detail-row td {
            padding-top: 0;
            padding-bottom: 1rem;
            border-bottom: 1px solid #e2e8f0;
        }
        .topic-table tbody tr.title-row:hover td {
            background: #f8fbff;
        }
        .topic-title {
            font-weight: 700;
            color: #1e293b;
            font-size: 0.95rem;
        }
        .topic-date {
            color: #64748b;
            font-size: 0.82rem;
            white-space: nowrap;
        }
        .badge {
            display: inline-block;
            padding: 0.2rem 0.65rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.06em;
        }
        .badge-visible {
            background: #e0f2fe;
            color: #0369a1;
            border: 1px solid #93c5fd;
        }
        .badge-hidden {
            background: #fee2e2;
            color: #b91c1c;
            border: 1px solid #fca5a5;
        }
        .topic-details {
            color: #64748b;
            font-size: 0.82rem;
            line-height: 1.7;
        }
        .topic-subtitle {
            color: #64748b;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 0.2rem;
        }
        .topic-attachments {
            margin-top: 0.65rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.45rem;
        }
        .topic-attach-link {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.28rem 0.55rem;
            border: 1px solid #cbd5e1;
            border-radius: 9999px;
            color: #1d4ed8;
            text-decoration: none;
            font-size: 0.75rem;
            background: #f8fbff;
        }
        .topic-attach-link:hover {
            border-color: #93c5fd;
            color: #1e40af;
        }

        /* Action buttons */
        .actions {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }
        .btn {
            padding: 0.45rem 1rem;
            border-radius: 0.6rem;
            border: none;
            font-size: 0.78rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s, transform 0.12s;
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
        }
        .btn:hover {
            transform: translateY(-1px);
        }
        .btn-edit {
            background: #eff6ff;
            color: #1d4ed8;
            border: 1px solid #93c5fd;
        }
        .btn-edit:hover {
            background: #dbeafe;
        }
        .btn-delete {
            background: #fee2e2;
            color: #b91c1c;
            border: 1px solid #fca5a5;
        }
        .btn-delete:hover {
            background: #fecaca;
        }

        /* Pagination */
        #pagination {
            display: flex;
            justify-content: center;
            gap: 0.4rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }
        #pagination .btn {
            background: #ffffff;
            color: #64748b;
            border: 1px solid #cbd5e1;
            border-radius: 0.5rem;
        }
        #pagination .btn:hover:not(:disabled) {
            background: #eff6ff;
            color: #1d4ed8;
            border-color: #93c5fd;
        }
        #pagination .btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }
        #pagination .btn-current {
            background: #dbeafe;
            color: #1d4ed8;
            border: 1px solid #60a5fa;
        }

        /* Footer */
        .admin-footer {
            text-align: center;
            padding: 1.25rem;
            font-size: 0.68rem;
            color: #64748b;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            border-top: 1px solid #e2e8f0;
        }

        @media (max-width: 760px) {
            .admin-header {
                padding: 0 1rem;
                height: 64px;
            }
            .admin-body {
                padding: 1.5rem 0.85rem 3rem;
            }
            .topic-table th,
            .topic-table td {
                padding-left: 0.75rem;
                padding-right: 0.75rem;
            }
            .actions {
                justify-content: flex-start;
            }
        }
    </style>
</head>
<body>
    <header class="admin-header">
        <a href="admin-portal.html" class="brand">
            <div class="brand-icon"><i class="fa-solid fa-shield-halved"></i></div>
            <div class="brand-text">CIDM <span>管理者ポータル</span></div>
        </a>
        <a href="admin-portal.html" class="header-back"><i class="fa-solid fa-chevron-left"></i> ポータルへ戻る</a>
    </header>

    <div class="admin-body">
        <div class="page-heading">
            <div class="left">
                <p class="eyebrow">Content Management</p>
                <h1>トピック管理</h1>
            </div>
            <button id="topic-new-btn" class="btn-new"><i class="fa-solid fa-plus"></i> 新規作成</button>
        </div>

        <div class="table-card">
            <table class="topic-table">
                <thead>
                    <tr>
                        <th>タイトル</th>
                        <th>日付</th>
                        <th>公開状態</th>
                    </tr>
                </thead>
                <tbody id="topics-tbody">
                    <tr><td colspan="3" style="text-align:center; color:#475569; padding:2rem;">読み込み中...</td></tr>
                </tbody>
            </table>
        </div>
        <div id="pagination"></div>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="./cidm-config.js"></script>
        <script src="./admin-auth.js"></script>
        <script src="./admin-ui.js"></script>
        <script>
        const supabaseClient = window.cidmAdminAuth.createSupabaseClient();

        const PAGE_SIZE = 20;
        let currentPage = 1;
        let totalPages = 1;
        let allData = [];

        function normalizeTopicId(value) {
            if (typeof value === 'number' && Number.isInteger(value)) {
                return value;
            }
            const normalized = Number(value);
            return Number.isInteger(normalized) ? normalized : null;
        }

        function escapeHtml(v) {
            return String(v || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function getFileNameFromUrl(url) {
            try {
                const path = new URL(url).pathname;
                return decodeURIComponent(path.split('/').pop() || url);
            } catch {
                return url;
            }
        }

        function renderLoadingRows() {
            const short = window.cidmAdminUi.getSkeletonLine('60%', '0.95rem');
            const mid = window.cidmAdminUi.getSkeletonLine('80%', '0.95rem');
            const long = window.cidmAdminUi.getSkeletonLine('95%', '2rem');
            return Array.from({ length: 4 }).map(() => `
                <tr>
                    <td>${mid}</td>
                    <td>${short}</td>
                    <td>${short}</td>
                </tr>
                <tr>
                    <td colspan="3">${long}</td>
                </tr>
            `).join('');
        }

        async function loadTopics(page = 1) {
            const tbody = document.getElementById('topics-tbody');
            const pagination = document.getElementById('pagination');
            tbody.innerHTML = renderLoadingRows();
            if (allData.length === 0) {
                const { data, error } = await supabaseClient.from('meeting_reports').select('*').order('event_date', { ascending: false });
                if (error) {
                    tbody.innerHTML = `<tr><td colspan="3" style="color:red; text-align:center;">データ取得エラー</td></tr>`;
                    pagination.innerHTML = '';
                    return;
                }
                if (!data || data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#888;">トピックはありません</td></tr>`;
                    pagination.innerHTML = '';
                    return;
                }
                allData = data;
                totalPages = Math.ceil(allData.length / PAGE_SIZE);
            }
            currentPage = page;
            const start = (currentPage - 1) * PAGE_SIZE;
            const end = start + PAGE_SIZE;
            const pageData = allData.slice(start, end);
            tbody.innerHTML = pageData.map(item => `
                ${(() => {
                    const attachmentUrls = Array.isArray(item.attachment_urls) ? item.attachment_urls : [];
                    const attachmentHtml = attachmentUrls.length
                        ? `<div class="topic-attachments">${attachmentUrls.map((url) => `<a class="topic-attach-link" href="${escapeHtml(url)}" target="_blank" rel="noopener"><i class="fa-solid fa-paperclip"></i>${escapeHtml(getFileNameFromUrl(url))}</a>`).join('')}</div>`
                        : '';
                    return `
                <tr class="title-row">
                    <td><span class="topic-title">${item.title || ''}</span></td>
                    <td><span class="topic-date">${item.event_date ? item.event_date.replace(/-/g, '.') : ''}</span></td>
                    <td><span class="badge ${item.is_visible ? 'badge-visible' : 'badge-hidden'}">${item.is_visible ? '公開' : '非公開'}</span></td>
                </tr>
                <tr class="detail-row">
                    <td colspan="3">
                        <div class="topic-subtitle">概要</div>
                        <div class="topic-details" style="margin-bottom:0.7rem; min-height:2.5em;">${item.details ? item.details.replace(/\n/g, '<br>') : ''}</div>
                        ${item.detail_text ? `<div class="topic-subtitle">詳細</div><div class="topic-details" style="margin-bottom:0.7rem;">${item.detail_text.replace(/\n/g, '<br>')}</div>` : ''}
                        ${attachmentHtml}
                        <div class="actions">
                            <a class="btn btn-edit" href="admin-topic-edit.html?id=${normalizeTopicId(item.id) ?? ''}"><i class="fa-solid fa-pen"></i> 編集</a>
                            <button class="btn btn-delete" data-topic-delete="${normalizeTopicId(item.id) ?? ''}"><i class="fa-solid fa-trash"></i> 削除</button>
                        </div>
                    </td>
                </tr>
                    `;
                })()}
            `).join('');
            // ページネーション描画（省略記号対応）
            let pagHtml = '';
            if (totalPages > 1) {
                pagHtml += `<button class="btn" ${currentPage === 1 ? 'disabled' : ''} data-page="${currentPage - 1}">前へ</button>`;
                let pageArr = [];
                if (totalPages <= 7) {
                    for (let i = 1; i <= totalPages; i++) pageArr.push(i);
                } else {
                    if (currentPage <= 4) {
                        pageArr = [1,2,3,4,5,'...',totalPages];
                    } else if (currentPage >= totalPages - 3) {
                        pageArr = [1,'...',totalPages-4,totalPages-3,totalPages-2,totalPages-1,totalPages];
                    } else {
                        pageArr = [1,'...',currentPage-1,currentPage,currentPage+1,'...',totalPages];
                    }
                }
                for (let p of pageArr) {
                    if (p === '...') {
                        pagHtml += `<span style="padding:0 0.5em; color:#475569;">...</span>`;
                    } else {
                        pagHtml += `<button class="btn ${p === currentPage ? 'btn-current' : ''}" data-page="${p}">${p}</button>`;
                    }
                }
                pagHtml += `<button class="btn" ${currentPage === totalPages ? 'disabled' : ''} data-page="${currentPage + 1}">次へ</button>`;
            }
            pagination.innerHTML = pagHtml;
        }

        function goPage(page) {
            loadTopics(page);
        }

        async function deleteTopic(id, triggerButton) {
            await window.cidmAdminUi.runWithButtonBusy(triggerButton, async () => {
                const accepted = await window.cidmAdminUi.showConfirm('削除しますか？', { confirmText: '削除する' });
                if (!accepted) {
                    return;
                }
                const ok = await window.cidmAdminAuth.ensureAuthenticated(supabaseClient, 'admin.html');
                if (!ok) return;

                const normalizedId = normalizeTopicId(id);
                if (normalizedId === null) {
                    window.cidmAdminUi.showToast('対象IDの形式が不正です。', 'error', 3000);
                    return;
                }

                const { error } = await supabaseClient.from('meeting_reports').delete().eq('id', normalizedId);
                if (error) {
                    window.cidmAdminUi.showToast('削除に失敗しました: ' + error.message, 'error', 3000);
                    return;
                }

                window.cidmAdminUi.showToast('削除しました', 'success');
                allData = allData.filter((item) => normalizeTopicId(item.id) !== normalizedId);
                totalPages = Math.max(1, Math.ceil(allData.length / PAGE_SIZE));
                if (currentPage > totalPages) {
                    currentPage = totalPages;
                }
                loadTopics(currentPage);
            }, '削除中...');
        }

        document.getElementById('topic-new-btn')?.addEventListener('click', () => {
            window.location.href = 'admin-topic-edit.html';
        });

        document.getElementById('topics-tbody')?.addEventListener('click', (event) => {
            const button = event.target.closest('button[data-topic-delete]');
            if (!button) return;
            const id = button.getAttribute('data-topic-delete');
            if (!id) return;
            deleteTopic(id, button);
        });

        document.getElementById('pagination')?.addEventListener('click', (event) => {
            const button = event.target.closest('button[data-page]');
            if (!button || button.disabled) return;
            const page = Number(button.getAttribute('data-page'));
            if (!Number.isFinite(page)) return;
            goPage(page);
        });

        document.addEventListener('DOMContentLoaded', async () => {
            const ok = await window.cidmAdminAuth.ensureAuthenticated(supabaseClient, 'admin.html');
            if (!ok) return;
            loadTopics(1);
        });
        </script>
    </div>

    <footer class="admin-footer">© 2013–2026 Center for Innovative Data and Mobility</footer>
</body>
</html>
