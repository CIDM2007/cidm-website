<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>トピック管理 | 管理者ポータル</title>
    <link href="./output.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0f172a; font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; display: flex; flex-direction: column; color: #cbd5e1; }

        /* Header */
        .admin-header { display:flex; align-items:center; justify-content:space-between; padding:0 2rem; height:64px; background:#0f172a; border-bottom:1px solid #1e293b; position:sticky; top:0; z-index:10; }
        .brand { display:flex; align-items:center; gap:0.75rem; text-decoration:none; }
        .brand-icon { width:36px; height:36px; background:linear-gradient(135deg,#3b82f6,#6366f1); border-radius:9px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:1rem; }
        .brand-text { font-size:0.78rem; font-weight:700; color:#94a3b8; letter-spacing:0.1em; text-transform:uppercase; }
        .brand-text span { display:block; color:#f1f5f9; font-size:0.9rem; letter-spacing:0.04em; }
        .header-back { display:inline-flex; align-items:center; gap:0.4rem; color:#64748b; text-decoration:none; font-size:0.78rem; font-weight:700; letter-spacing:0.06em; border:1px solid #334155; border-radius:9999px; padding:0.3rem 0.9rem; transition:color 0.15s, border-color 0.15s; }
        .header-back:hover { color:#93c5fd; border-color:#3b82f6; }

        /* Body */
        .admin-body { flex:1; padding:2.5rem 1.5rem 4rem; max-width:980px; margin:0 auto; width:100%; }

        /* Page heading */
        .page-heading { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:2rem; flex-wrap:wrap; gap:1rem; }
        .page-heading .left .eyebrow { font-size:0.7rem; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:#3b82f6; margin-bottom:0.35rem; }
        .page-heading .left h1 { font-size:1.7rem; font-weight:700; color:#f1f5f9; }

        /* New button */
        .btn-new { display:inline-flex; align-items:center; gap:0.5rem; background:linear-gradient(135deg,#3b82f6,#6366f1); color:#fff; border:none; padding:0.65rem 1.4rem; border-radius:9999px; font-size:0.84rem; font-weight:700; cursor:pointer; transition:opacity 0.15s, transform 0.12s; }
        .btn-new:hover { opacity:0.88; transform:translateY(-1px); }

        /* Table card */
        .table-card { background:#1e293b; border:1px solid #334155; border-radius:1rem; overflow:hidden; }
        .topic-table { width:100%; border-collapse:collapse; }
        .topic-table th { background:#0f172a; color:#64748b; font-size:0.72rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; padding:0.85rem 1rem; text-align:left; border-bottom:1px solid #334155; }
        .topic-table td { padding:0.9rem 1rem; border-bottom:1px solid #1e3a52; vertical-align:top; color:#cbd5e1; font-size:0.9rem; }
        .topic-table tbody tr:last-child td { border-bottom:none; }
        .topic-table tbody tr.detail-row td { padding-top:0; padding-bottom:1rem; border-bottom:1px solid #334155; }
        .topic-table tbody tr.title-row:hover td { background:#263347; }
        .topic-title { font-weight:700; color:#e2e8f0; font-size:0.95rem; }
        .topic-date { color:#64748b; font-size:0.82rem; white-space:nowrap; }
        .badge { display:inline-block; padding:0.2rem 0.65rem; border-radius:9999px; font-size:0.7rem; font-weight:700; letter-spacing:0.06em; }
        .badge-visible { background:#1d3a6e; color:#93c5fd; border:1px solid #3b82f6; }
        .badge-hidden { background:#2d1b1b; color:#f87171; border:1px solid #b91c1c; }
        .topic-details { color:#64748b; font-size:0.82rem; line-height:1.7; }
        .topic-subtitle { color:#94a3b8; font-size:0.72rem; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:0.2rem; }
        .topic-attachments { margin-top:0.65rem; display:flex; flex-wrap:wrap; gap:0.45rem; }
        .topic-attach-link { display:inline-flex; align-items:center; gap:0.3rem; padding:0.28rem 0.55rem; border:1px solid #334155; border-radius:9999px; color:#93c5fd; text-decoration:none; font-size:0.75rem; }
        .topic-attach-link:hover { border-color:#3b82f6; color:#bfdbfe; }

        /* Action buttons */
        .actions { display:flex; gap:0.5rem; justify-content:flex-end; margin-top:0.5rem; }
        .btn { padding:0.45rem 1rem; border-radius:0.6rem; border:none; font-size:0.78rem; font-weight:700; cursor:pointer; transition:background 0.15s, transform 0.12s; display:inline-flex; align-items:center; gap:0.35rem; }
        .btn:hover { transform:translateY(-1px); }
        .btn-edit { background:#1e3a5f; color:#93c5fd; border:1px solid #2563eb; }
        .btn-edit:hover { background:#1d3a6e; }
        .btn-delete { background:#2d1b1b; color:#f87171; border:1px solid #b91c1c; }
        .btn-delete:hover { background:#3d1f1f; }

        /* Pagination */
        #pagination { display:flex; justify-content:center; gap:0.4rem; margin-top:1.5rem; flex-wrap:wrap; }
        #pagination .btn { background:#1e293b; color:#64748b; border:1px solid #334155; border-radius:0.5rem; }
        #pagination .btn:hover:not(:disabled) { background:#263347; color:#93c5fd; border-color:#3b82f6; }
        #pagination .btn:disabled { opacity:0.35; cursor:not-allowed; }
        #pagination .btn-current { background:#1d3a6e; color:#93c5fd; border:1px solid #3b82f6; }

        /* Footer */
        .admin-footer { text-align:center; padding:1.25rem; font-size:0.68rem; color:#334155; letter-spacing:0.08em; text-transform:uppercase; border-top:1px solid #1e293b; }
    </style>
</head>
<body>
    <header class="admin-header">
        <a href="admin-portal.html" class="brand">
            <div class="brand-icon"><i class="fa-solid fa-shield-halved"></i></div>
            <div class="brand-text">CIDM <span>管理者ポータル</span></div>
        </a>
        <a href="admin-portal.html" class="header-back"><i class="fa-solid fa-chevron-left"></i> ポータルへ戻る</a>
    </header>

    <div class="admin-body">
        <div class="page-heading">
            <div class="left">
                <p class="eyebrow">Content Management</p>
                <h1>トピック管理</h1>
            </div>
            <button id="topic-new-btn" class="btn-new"><i class="fa-solid fa-plus"></i> 新規作成</button>
        </div>

        <div class="table-card">
            <table class="topic-table">
                <thead>
                    <tr>
                        <th>タイトル</th>
                        <th>日付</th>
                        <th>公開状態</th>
                    </tr>
                </thead>
                <tbody id="topics-tbody">
                    <tr><td colspan="3" style="text-align:center; color:#475569; padding:2rem;">読み込み中...</td></tr>
                </tbody>
            </table>
        </div>
        <div id="pagination"></div>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="./cidm-config.js"></script>
        <script src="./admin-auth.js"></script>
        <script src="./admin-ui.js"></script>
        <script>
        const supabaseClient = window.cidmAdminAuth.createSupabaseClient();

        const PAGE_SIZE = 20;
        let currentPage = 1;
        let totalPages = 1;
        let allData = [];

        function escapeHtml(v) {
            return String(v || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function getFileNameFromUrl(url) {
            try {
                const path = new URL(url).pathname;
                return decodeURIComponent(path.split('/').pop() || url);
            } catch {
                return url;
            }
        }

        function renderLoadingRows() {
            const short = window.cidmAdminUi.getSkeletonLine('60%', '0.95rem');
            const mid = window.cidmAdminUi.getSkeletonLine('80%', '0.95rem');
            const long = window.cidmAdminUi.getSkeletonLine('95%', '2rem');
            return Array.from({ length: 4 }).map(() => `
                <tr>
                    <td>${mid}</td>
                    <td>${short}</td>
                    <td>${short}</td>
                </tr>
                <tr>
                    <td colspan="3">${long}</td>
                </tr>
            `).join('');
        }

        async function loadTopics(page = 1) {
            const tbody = document.getElementById('topics-tbody');
            const pagination = document.getElementById('pagination');
            tbody.innerHTML = renderLoadingRows();
            if (allData.length === 0) {
                const { data, error } = await supabaseClient.from('meeting_reports').select('*').order('event_date', { ascending: false });
                if (error) {
                    tbody.innerHTML = `<tr><td colspan="3" style="color:red; text-align:center;">データ取得エラー</td></tr>`;
                    pagination.innerHTML = '';
                    return;
                }
                if (!data || data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#888;">トピックはありません</td></tr>`;
                    pagination.innerHTML = '';
                    return;
                }
                allData = data;
                totalPages = Math.ceil(allData.length / PAGE_SIZE);
            }
            currentPage = page;
            const start = (currentPage - 1) * PAGE_SIZE;
            const end = start + PAGE_SIZE;
            const pageData = allData.slice(start, end);
            tbody.innerHTML = pageData.map(item => `
                ${(() => {
                    const attachmentUrls = Array.isArray(item.attachment_urls) ? item.attachment_urls : [];
                    const attachmentHtml = attachmentUrls.length
                        ? `<div class="topic-attachments">${attachmentUrls.map((url) => `<a class="topic-attach-link" href="${escapeHtml(url)}" target="_blank" rel="noopener"><i class="fa-solid fa-paperclip"></i>${escapeHtml(getFileNameFromUrl(url))}</a>`).join('')}</div>`
                        : '';
                    return `
                <tr class="title-row">
                    <td><span class="topic-title">${item.title || ''}</span></td>
                    <td><span class="topic-date">${item.event_date ? item.event_date.replace(/-/g, '.') : ''}</span></td>
                    <td><span class="badge ${item.is_visible ? 'badge-visible' : 'badge-hidden'}">${item.is_visible ? '公開' : '非公開'}</span></td>
                </tr>
                <tr class="detail-row">
                    <td colspan="3">
                        <div class="topic-subtitle">概要</div>
                        <div class="topic-details" style="margin-bottom:0.7rem; min-height:2.5em;">${item.details ? item.details.replace(/\n/g, '<br>') : ''}</div>
                        ${item.detail_text ? `<div class="topic-subtitle">詳細</div><div class="topic-details" style="margin-bottom:0.7rem;">${item.detail_text.replace(/\n/g, '<br>')}</div>` : ''}
                        ${attachmentHtml}
                        <div class="actions">
                            <a class="btn btn-edit" href="admin-topic-edit.html?id=${item.id}"><i class="fa-solid fa-pen"></i> 編集</a>
                            <button class="btn btn-delete" data-topic-delete="${item.id}"><i class="fa-solid fa-trash"></i> 削除</button>
                        </div>
                    </td>
                </tr>
                    `;
                })()}
            `).join('');
            // ページネーション描画（省略記号対応）
            let pagHtml = '';
            if (totalPages > 1) {
                pagHtml += `<button class="btn" ${currentPage === 1 ? 'disabled' : ''} data-page="${currentPage - 1}">前へ</button>`;
                let pageArr = [];
                if (totalPages <= 7) {
                    for (let i = 1; i <= totalPages; i++) pageArr.push(i);
                } else {
                    if (currentPage <= 4) {
                        pageArr = [1,2,3,4,5,'...',totalPages];
                    } else if (currentPage >= totalPages - 3) {
                        pageArr = [1,'...',totalPages-4,totalPages-3,totalPages-2,totalPages-1,totalPages];
                    } else {
                        pageArr = [1,'...',currentPage-1,currentPage,currentPage+1,'...',totalPages];
                    }
                }
                for (let p of pageArr) {
                    if (p === '...') {
                        pagHtml += `<span style="padding:0 0.5em; color:#475569;">...</span>`;
                    } else {
                        pagHtml += `<button class="btn ${p === currentPage ? 'btn-current' : ''}" data-page="${p}">${p}</button>`;
                    }
                }
                pagHtml += `<button class="btn" ${currentPage === totalPages ? 'disabled' : ''} data-page="${currentPage + 1}">次へ</button>`;
            }
            pagination.innerHTML = pagHtml;
        }

        function goPage(page) {
            loadTopics(page);
        }

        async function deleteTopic(id, triggerButton) {
            await window.cidmAdminUi.runWithButtonBusy(triggerButton, async () => {
                const accepted = await window.cidmAdminUi.showConfirm('削除しますか？', { confirmText: '削除する' });
                if (!accepted) {
                    return;
                }
                const ok = await window.cidmAdminAuth.ensureAuthenticated(supabaseClient);
                if (!ok) return;

                const { error } = await supabaseClient.from('meeting_reports').delete().eq('id', id);
                if (error) {
                    window.cidmAdminUi.showToast('削除に失敗しました: ' + error.message, 'error', 3000);
                    return;
                }

                window.cidmAdminUi.showToast('削除しました', 'success');
                allData = allData.filter((item) => item.id !== id);
                totalPages = Math.max(1, Math.ceil(allData.length / PAGE_SIZE));
                if (currentPage > totalPages) {
                    currentPage = totalPages;
                }
                loadTopics(currentPage);
            }, '削除中...');
        }

        document.getElementById('topic-new-btn')?.addEventListener('click', () => {
            window.location.href = 'admin-topic-edit.html';
        });

        document.getElementById('topics-tbody')?.addEventListener('click', (event) => {
            const button = event.target.closest('button[data-topic-delete]');
            if (!button) return;
            const id = button.getAttribute('data-topic-delete');
            if (!id) return;
            deleteTopic(id, button);
        });

        document.getElementById('pagination')?.addEventListener('click', (event) => {
            const button = event.target.closest('button[data-page]');
            if (!button || button.disabled) return;
            const page = Number(button.getAttribute('data-page'));
            if (!Number.isFinite(page)) return;
            goPage(page);
        });

        document.addEventListener('DOMContentLoaded', async () => {
            const ok = await window.cidmAdminAuth.ensureAuthenticated(supabaseClient);
            if (!ok) return;
            loadTopics(1);
        });
        </script>
    </div>

    <footer class="admin-footer">© 2013–2026 Center for Innovative Data and Mobility</footer>
</body>
</html>
