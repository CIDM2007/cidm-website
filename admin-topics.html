<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>トピック管理 | 管理者ポータル</title>
    <link href="./output.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f3f4f6; font-family: 'Noto Sans JP', sans-serif; }
        .top-bar { width:100%; background:#e5e7eb; color:#374151; padding:0.8rem 0; display:flex; justify-content:space-between; align-items:center; font-size:1.1rem; font-weight:bold; letter-spacing:0.05em; }
        .top-bar span { margin: 0 2rem; }
        .container { max-width: 900px; margin: 60px auto; background: #fff; border-radius: 1.5rem; box-shadow: 0 4px 24px #0001; padding: 2.5rem 2rem; }
        h1 { font-size: 1.6rem; font-weight: bold; color: #374151; margin-bottom: 2rem; }
        .topic-table { width: 100%; border-collapse: collapse; margin-bottom: 2rem; }
        .topic-table th, .topic-table td { border-bottom: 1px solid #e5e7eb; padding: 0.9rem 0.7rem; text-align: left; }
        .topic-table th { background: #f1f5f9; color: #374151; font-weight: bold; }
        .topic-table td { background: #fff; }
        .actions button { margin-right: 0.5rem; }
        .btn { padding: 0.5rem 1.2rem; border-radius: 0.7rem; border: none; font-weight: 500; cursor: pointer; transition: background 0.2s; }
        .btn-edit { background: #6b7280; color: #fff; }
        .btn-edit:hover { background: #4b5563; }
        .btn-delete { background: #e11d48; color: #fff; }
        .btn-delete:hover { background: #be123c; }
        .btn-new { background: #6b7280; color: #fff; margin-bottom: 1.5rem; }
        .btn-new:hover { background: #4b5563; }
    </style>
</head>
<body>
    <div class="top-bar">
        <span>一般社団法人車両情報活用研究所</span>
        <a href="admin-portal.html" style="color:inherit; text-decoration:none; cursor:pointer;">管理者ポータル</a>
    </div>
    <div class="container">
        <h1><i class="fa-solid fa-newspaper"></i> トピック（おしらせ）管理</h1>
        <button class="btn btn-new" onclick="window.location.href='admin-topic-edit.html'"><i class="fa-solid fa-plus"></i> 新規作成</button>
        <table class="topic-table">
            <thead>
                <tr>
                    <th>タイトル</th>
                    <th>日付</th>
                    <th>公開</th>
                </tr>
            </thead>
            <tbody id="topics-tbody">
                <tr><td colspan="3" style="text-align:center; color:#888;">読み込み中...</td></tr>
            </tbody>
        </table>
        <div id="pagination" style="display:flex;justify-content:center;gap:0.5rem;margin-bottom:1.5rem;max-width:600px;margin-left:auto;margin-right:auto;flex-wrap:wrap;"></div>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script>
        const SUPABASE_URL = 'https://uhhhifbotqidqeceqyis.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_cw8HMeoelYDwqoo7dMeiIg_9ZgCekYG';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const PAGE_SIZE = 20;
        let currentPage = 1;
        let totalPages = 1;
        let allData = [];

        async function loadTopics(page = 1) {
            const tbody = document.getElementById('topics-tbody');
            const pagination = document.getElementById('pagination');
            tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#888;">読み込み中...</td></tr>';
            if (allData.length === 0) {
                const { data, error } = await supabaseClient.from('meeting_reports').select('*').order('event_date', { ascending: false });
                if (error) {
                    tbody.innerHTML = `<tr><td colspan="3" style="color:red; text-align:center;">データ取得エラー</td></tr>`;
                    pagination.innerHTML = '';
                    return;
                }
                if (!data || data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#888;">トピックはありません</td></tr>`;
                    pagination.innerHTML = '';
                    return;
                }
                allData = data;
                totalPages = Math.ceil(allData.length / PAGE_SIZE);
            }
            currentPage = page;
            const start = (currentPage - 1) * PAGE_SIZE;
            const end = start + PAGE_SIZE;
            const pageData = allData.slice(start, end);
            tbody.innerHTML = pageData.map(item => `
                <tr>
                    <td style="font-weight:bold; font-size:1.1rem;">${item.title || ''}</td>
                    <td>${item.event_date ? item.event_date.replace(/-/g, '.') : ''}</td>
                    <td>${item.is_visible ? '公開' : '非公開'}</td>
                </tr>
                <tr>
                    <td colspan="3">
                        <div style="color:#374151; margin-bottom:0.7rem; min-height:3.5em;">${item.details ? item.details.replace(/\n/g, '<br>') : ''}</div>
                        <div class="actions" style="text-align:right;">
                            <a class="btn btn-edit" href="admin-topic-edit.html?id=${item.id}"><i class="fa-solid fa-pen"></i> 編集</a>
                            <button class="btn btn-delete" onclick="if(confirm('削除しますか？')){alert('削除しました')}"<i class="fa-solid fa-trash"></i> 削除</button>
                        </div>
                    </td>
                </tr>
            `).join('');
            // ページネーション描画（省略記号対応）
            let pagHtml = '';
            if (totalPages > 1) {
                pagHtml += `<button class="btn" ${currentPage === 1 ? 'disabled' : ''} onclick="goPage(${currentPage - 1})">前へ</button>`;
                let pageArr = [];
                if (totalPages <= 7) {
                    for (let i = 1; i <= totalPages; i++) pageArr.push(i);
                } else {
                    if (currentPage <= 4) {
                        pageArr = [1,2,3,4,5,'...',totalPages];
                    } else if (currentPage >= totalPages - 3) {
                        pageArr = [1,'...',totalPages-4,totalPages-3,totalPages-2,totalPages-1,totalPages];
                    } else {
                        pageArr = [1,'...',currentPage-1,currentPage,currentPage+1,'...',totalPages];
                    }
                }
                for (let p of pageArr) {
                    if (p === '...') {
                        pagHtml += `<span style="padding:0 0.5em;">...</span>`;
                    } else {
                        pagHtml += `<button class="btn" style="${p === currentPage ? 'background:#6b7280;color:#fff;' : ''}" onclick="goPage(${p})">${p}</button>`;
                    }
                }
                pagHtml += `<button class="btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="goPage(${currentPage + 1})">次へ</button>`;
            }
            pagination.innerHTML = pagHtml;
        }

        function goPage(page) {
            loadTopics(page);
        }

        document.addEventListener('DOMContentLoaded', () => { loadTopics(1); });
        </script>
    </div>
</body>
</html>
