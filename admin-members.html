<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会員管理 | 管理者ポータル</title>
    <link rel="icon" type="image/png" href="./CIDMchara.png">
    <link href="./output.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background:
                radial-gradient(1200px 500px at 20% -10%, #dbeafe 0%, transparent 60%),
                radial-gradient(900px 400px at 85% -5%, #e0e7ff 0%, transparent 55%),
                #eef2f7;
            color: #1e293b;
            font-family: 'Noto Sans JP', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .admin-header {
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:0 1.5rem;
            height:72px;
            background: rgba(255, 255, 255, 0.78);
            backdrop-filter: blur(8px);
            border-bottom:1px solid #dbe4ef;
            position:sticky;
            top:0;
            z-index:10;
            box-shadow: 0 1px 8px rgba(15, 23, 42, 0.06);
        }
        .brand { display:flex; align-items:center; gap:0.75rem; text-decoration:none; }
        .brand-icon { width:38px; height:38px; background:linear-gradient(135deg,#2563eb,#0ea5e9); border-radius:9px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:1rem; }
        .brand-text { font-size:0.78rem; font-weight:700; color:#64748b; letter-spacing:0.1em; text-transform:uppercase; }
        .brand-text span { display:block; color:#1e293b; font-size:0.9rem; letter-spacing:0.04em; }
        .header-back {
            display:inline-flex;
            align-items:center;
            gap:0.4rem;
            background:#eff6ff;
            color:#475569;
            text-decoration:none;
            font-size:0.76rem;
            font-weight:700;
            letter-spacing:0.06em;
            border:1px solid #bfdbfe;
            border-radius:9999px;
            padding:0.35rem 0.95rem;
            transition: color 0.15s, border-color 0.15s, background 0.15s;
        }
        .header-back:hover { color:#1d4ed8; border-color:#93c5fd; background:#dbeafe; }

        .admin-body { flex:1; padding:2.25rem 1.2rem 4rem; max-width:980px; margin:0 auto; width:100%; }
        .page-heading { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:1.5rem; gap:1rem; flex-wrap:wrap; }
        .eyebrow { font-size:0.7rem; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:#3b82f6; margin-bottom:0.35rem; }
        h1 { font-size:1.65rem; font-weight:700; color:#1e293b; }

        .panel { background:#ffffff; border:1px solid #dbe4ef; border-radius:1rem; padding:1.5rem; box-shadow: 0 1px 6px rgba(15, 23, 42, 0.08); }
        .member-card {
            background:#f8fbff;
            border-radius: 1rem;
            border: 1px solid #dbe4ef;
            margin-bottom: 1rem;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 1.1rem;
            transition: background 0.18s, border-color 0.18s;
        }
        .member-card:hover { background:#f1f7ff; border-color:#93c5fd; }
        .member-main-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1.4rem;
            align-items: flex-end;
        }
        .member-label {
            font-size: 0.72rem;
            color: #64748b;
            font-weight: 700;
            margin-bottom: 0.2em;
            display: block;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .member-value {
            font-size: 1rem;
            color: #1e293b;
            font-weight: 500;
            margin-bottom: 0.3em;
        }
        .member-sub-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1.4rem;
        }
        .member-biko {
            color: #475569;
            font-size: 0.92rem;
            background: #ffffff;
            border: 1px solid #dbe4ef;
            border-radius: 0.6rem;
            padding: 0.7rem 0.9rem;
        }
        @media (max-width: 700px) {
            .member-main-row, .member-sub-row { flex-direction: column; gap: 0.6rem; }
            .member-card { padding: 0.9rem; }
        }
        .actions { display:flex; justify-content:space-between; align-items:center; margin-top:0.5rem; gap:0.8rem; }
        .btn { padding: 0.5rem 1.1rem; border-radius: 0.6rem; border: none; font-weight: 700; cursor: pointer; transition: opacity 0.15s, transform 0.12s; text-decoration:none; display:inline-flex; align-items:center; gap:0.35rem; }
        .btn:hover { transform: translateY(-1px); }
        .btn-edit { background: linear-gradient(135deg,#2563eb,#0ea5e9); color: #fff; box-shadow: 0 8px 18px rgba(37, 99, 235, 0.2); }
        .btn-edit:hover { opacity: 0.9; }
        .btn-delete { background: #fee2e2; border: 1px solid #fca5a5; color: #b91c1c; }
        .btn-delete:hover { background: #fecaca; color: #991b1b; }
        .msg { text-align:center; color:#64748b; padding:1.1rem; }
        .msg.error { color:#b91c1c; }
        .admin-footer { text-align:center; padding:1.25rem; font-size:0.68rem; color:#64748b; letter-spacing:0.08em; text-transform:uppercase; border-top:1px solid #e2e8f0; }
    </style>
</head>
<body>
    <header class="admin-header">
        <a href="admin-portal.html" class="brand">
            <div class="brand-icon"><i class="fa-solid fa-shield-halved"></i></div>
            <div class="brand-text">CIDM <span>管理者ポータル</span></div>
        </a>
        <a href="admin-member-list.html" class="header-back"><i class="fa-solid fa-chevron-left"></i> 会員一覧へ戻る</a>
    </header>

    <div class="admin-body">
        <div class="page-heading">
            <div>
                <p class="eyebrow">Member Management</p>
                <h1><i class="fa-solid fa-users"></i> 会員詳細</h1>
            </div>
        </div>
        <div class="panel">
            <div id="members-list">
                <div class="msg">読み込み中...</div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./cidm-config.js"></script>
    <script src="./admin-auth.js"></script>
    <script src="./admin-ui.js"></script>
    <script>
    const supabaseClient = window.cidmAdminAuth.createSupabaseClient();

    function renderLoadingCard() {
        const s1 = window.cidmAdminUi.getSkeletonLine('100%', '0.95rem');
        const s2 = window.cidmAdminUi.getSkeletonLine('100%', '2rem');
        return `
            <div class="member-card">
                <div class="member-main-row">
                    <div style="width:120px;">${s1}</div>
                    <div style="width:200px;">${s1}</div>
                    <div style="width:150px;">${s1}</div>
                </div>
                <div class="member-sub-row">
                    <div style="width:120px;">${s1}</div>
                    <div style="width:260px;">${s1}</div>
                    <div style="width:140px;">${s1}</div>
                </div>
                <div class="member-sub-row">
                    <div style="width:140px;">${s1}</div>
                    <div style="width:140px;">${s1}</div>
                    <div style="width:180px;">${s1}</div>
                </div>
                <div style="width:100%;">${s2}</div>
            </div>
        `;
    }

    // URLからidパラメータを取得
    function getIdParam() {
        const params = new URLSearchParams(window.location.search);
        return params.get('id');
    }

    async function loadMember() {
        const list = document.getElementById('members-list');
        list.innerHTML = renderLoadingCard();
        const id = getIdParam();
        if (!id) {
            list.innerHTML = '<div class="msg error">IDが指定されていないため一覧へ戻ります...</div>';
            setTimeout(() => { window.location.href = 'admin-member-list.html'; }, 900);
            return;
        }
        const { data, error } = await supabaseClient.from('member').select('*').eq('id', id).single();
        if (error || !data) {
            list.innerHTML = '<div class="msg error">データ取得エラー または データがありません</div>';
            return;
        }
        const item = data;
        list.innerHTML = `
            <div class="member-card">
                <div class="member-main-row">
                    <div><span class="member-label">区分</span><span class="member-value">${item.division_flag || '会員'}</span></div>
                    <div><span class="member-label">会員種別</span><span class="member-value">${item.member_type || '-'}</span></div>
                    <div><span class="member-label">会社名</span><span class="member-value">${item.company_name || ''}</span></div>
                    <div><span class="member-label">CIDM役職</span><span class="member-value">${item.cidm_role || '-'}</span></div>
                </div>
                <div class="member-sub-row">
                    <div><span class="member-label">責任者名</span><span class="member-value">${item.representative_name || ''}</span></div>
                    <div><span class="member-label">Email</span><span class="member-value">${item.email || ''}</span></div>
                </div>
                <div class="member-sub-row">
                    <div><span class="member-label">郵便番号</span><span class="member-value">${item.zip_code || ''}</span></div>
                    <div><span class="member-label">住所</span><span class="member-value">${item.address || ''}</span></div>
                    <div><span class="member-label">電話番号</span><span class="member-value">${item.phone_number || ''}</span></div>
                </div>
                <div class="member-sub-row">
                    <div><span class="member-label">FAX</span><span class="member-value">${item.fax_number || '-'}</span></div>
                    <div><span class="member-label">主担当者</span><span class="member-value">${item.staff_name || ''}</span></div>
                    <div><span class="member-label">主担当携帯</span><span class="member-value">${item.staff_mobile || '-'}</span></div>
                    <div><span class="member-label">主担当メール</span><span class="member-value">${item.staff_email || '-'}</span></div>
                </div>
                <div class="member-biko"><span class="member-label">備考</span>${item.biko || ''}</div>
                <div class="actions">
                    <button class="btn btn-delete" data-member-delete="${item.id}"><i class="fa-solid fa-trash"></i> 削除</button>
                    <a class="btn btn-edit" href="admin-member-edit.html?id=${item.id}"><i class="fa-solid fa-pen"></i> 編集</a>
                </div>
            </div>
        `;
    }

    document.getElementById('members-list')?.addEventListener('click', (event) => {
        const button = event.target.closest('button[data-member-delete]');
        if (!button) return;
        const id = button.getAttribute('data-member-delete');
        if (!id) return;
        deleteMember(id, button);
    });

    async function deleteMember(id, triggerButton) {
        await window.cidmAdminUi.runWithButtonBusy(triggerButton, async () => {
            const accepted = await window.cidmAdminUi.showConfirm('削除しますか?', { confirmText: '削除する' });
            if (!accepted) {
                return;
            }
            const ok = await window.cidmAdminAuth.ensureAuthenticated(supabaseClient, 'admin.html');
            if (!ok) return;

            const { error } = await supabaseClient.from('member').delete().eq('id', id);
            if (error) {
                window.cidmAdminUi.showToast('削除に失敗しました: ' + error.message, 'error', 3000);
                return;
            }

            window.cidmAdminUi.showToast('削除しました', 'success', 900);
            setTimeout(() => { window.location.href = 'admin-member-list.html'; }, 500);
        }, '削除中...');
    }

    document.addEventListener('DOMContentLoaded', async () => {
        const ok = await window.cidmAdminAuth.ensureAuthenticated(supabaseClient, 'admin.html');
        if (!ok) return;
        loadMember();
    });
    </script>

    <footer class="admin-footer">© 2013–2026 Center for Innovative Data and Mobility</footer>
</body>
</html>
